<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>r7-viz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void: #06060a;
      --deep: #0a0a10;
      --surface: #101018;
      --elevated: #16161f;
      --hover: #1c1c28;
      --border: #2a2a3a;
      --text-primary: #e4e4ed;
      --text-secondary: #8888a0;
      --text-muted: #5a5a70;
      --accent: #7c3aed;
    }

    body {
      background: var(--void);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #graph-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.03) 0%, transparent 70%),
        linear-gradient(to bottom, var(--void), var(--deep));
    }

    #graph-container canvas { outline: none; }

    /* Loading overlay */
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--void);
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading span { margin-left: 16px; color: var(--text-secondary); font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats bar */
    #stats {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      z-index: 10;
      display: flex;
      gap: 16px;
      backdrop-filter: blur(8px);
    }
    #stats .stat-value { color: var(--text-primary); font-weight: 600; }

    /* Legend */
    #legend {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: var(--text-secondary);
      z-index: 10;
      max-height: 70vh;
      overflow-y: auto;
      backdrop-filter: blur(8px);
      min-width: 180px;
    }
    #legend h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      cursor: pointer;
      opacity: 0.9;
      user-select: none;
    }
    .legend-item:hover { opacity: 1; }
    .legend-item.dimmed { opacity: 0.3; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-group {
      margin-bottom: 2px;
    }
    .legend-group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      cursor: pointer;
      opacity: 0.9;
      user-select: none;
      font-weight: 600;
    }
    .legend-group-header:hover { opacity: 1; }
    .legend-group-header.dimmed { opacity: 0.3; }
    .legend-group-header .toggle {
      font-size: 9px;
      color: var(--text-muted);
      width: 12px;
      text-align: center;
      flex-shrink: 0;
    }
    .legend-sub-items {
      padding-left: 18px;
      overflow: hidden;
      max-height: 500px;
      transition: max-height 0.2s ease;
    }
    .legend-sub-items.collapsed {
      max-height: 0;
    }

    /* Detail panel */
    #detail {
      position: absolute;
      bottom: 12px; left: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 12px;
      color: var(--text-secondary);
      z-index: 10;
      max-width: 480px;
      max-height: 40vh;
      overflow-y: auto;
      backdrop-filter: blur(8px);
      display: none;
    }
    #detail.visible { display: block; }
    #detail h2 {
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 4px;
      word-break: break-all;
    }
    #detail .meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    #detail .description {
      color: var(--text-secondary);
      line-height: 1.5;
      white-space: pre-wrap;
    }
    #detail .description.collapsed { max-height: 200px; overflow-y: hidden; }
    #detail .show-more {
      display: inline-block;
      margin-top: 4px;
      color: var(--accent);
      cursor: pointer;
      font-size: 11px;
    }
    #detail .show-more:hover { text-decoration: underline; }
    #detail .props-list {
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    #detail .props-list h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .prop-item {
      font-size: 11px;
      padding: 1px 0;
    }
    .prop-key { color: var(--accent); }
    .prop-val { color: var(--text-secondary); }
    #detail .edges-list {
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    #detail .edge-item {
      padding: 2px 0;
      font-size: 11px;
    }
    .edge-type { color: var(--accent); font-weight: 500; }
    .edge-target { color: var(--text-primary); cursor: pointer; }
    .edge-target:hover { text-decoration: underline; }

    /* Layout control buttons */
    #layout-controls {
      position: absolute;
      top: 12px; left: 50%; transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .layout-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: opacity 0.2s, border-color 0.2s;
    }
    .layout-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .layout-btn.active { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    #heat-btn.active { border-color: #f97316; color: #f97316; background: rgba(249, 115, 22, 0.1); }

    /* Search */
    #search-container {
      position: absolute;
      bottom: 12px; right: 12px;
      z-index: 10;
    }
    #search {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      width: 220px;
      outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    /* Path mode status */
    #path-status {
      position: absolute;
      bottom: 52px; right: 12px;
      background: rgba(6, 182, 212, 0.15);
      border: 1px solid rgba(6, 182, 212, 0.4);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 11px;
      color: #06b6d4;
      z-index: 10;
      backdrop-filter: blur(8px);
      display: none;
    }
    #path-status.visible { display: block; }
    #path-status .path-hint { color: var(--text-muted); }
    #path-status .path-length { color: var(--text-primary); font-weight: 600; }

    /* Heat legend */
    #heat-legend {
      position: absolute;
      bottom: 52px; left: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 10px;
      color: var(--text-secondary);
      z-index: 10;
      display: none;
      backdrop-filter: blur(8px);
    }
    #heat-legend h4 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .heat-tier {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 2px 0;
    }
    .heat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Scrollbar styling */
    #legend::-webkit-scrollbar,
    #detail::-webkit-scrollbar {
      width: 6px;
    }
    #legend::-webkit-scrollbar-track,
    #detail::-webkit-scrollbar-track {
      background: transparent;
    }
    #legend::-webkit-scrollbar-thumb,
    #detail::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="graph-container"></div>

  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-text">Loading graph...</span>
    <div id="progress-bar" style="display:none; width:160px; height:4px; background:var(--border); border-radius:2px; margin-left:16px; overflow:hidden;">
      <div id="progress-fill" style="width:0%; height:100%; background:var(--accent); border-radius:2px; transition:width 0.15s;"></div>
    </div>
  </div>

  <div id="stats">
    <div>Nodes: <span class="stat-value" id="node-count">-</span></div>
    <div>Edges: <span class="stat-value" id="edge-count">-</span></div>
    <div><span id="group-label">Groups</span>: <span class="stat-value" id="channel-count">-</span></div>
  </div>

  <div id="legend"></div>

  <div id="detail">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
      <h2 id="detail-name" style="flex:1;"></h2>
      <button id="focus-btn" class="layout-btn" style="font-size:10px; padding:3px 10px; flex-shrink:0;" title="Focus: cycle 1-hop → 2-hop → 3-hop → off (or double-click node)">Focus</button>
    </div>
    <div class="meta" id="detail-meta"></div>
    <div class="description collapsed" id="detail-desc"></div>
    <span class="show-more" id="detail-show-more" style="display:none"></span>
    <div class="props-list" id="detail-props"></div>
    <div class="edges-list" id="detail-edges"></div>
  </div>

  <div id="layout-controls">
    <button id="refresh-btn" class="layout-btn" title="Re-fetch graph data">&#x21BB;</button>
    <button id="reset-layout-btn" class="layout-btn">Reset positions</button>
    <button id="tighten-btn" class="layout-btn">Tighten</button>
    <select id="tighten-method" style="background:var(--surface); color:var(--text-secondary); border:1px solid var(--border); border-radius:4px; padding:2px 4px; font-size:10px; font-family:inherit; cursor:pointer;" title="Layout method">
      <option value="forceatlas2">ForceAtlas2</option>
      <option value="group-attract" selected>Group-Attract</option>
      <option value="fruchterman">Fruchterman-Reingold</option>
      <option value="circular">Circular by Group</option>
      <option value="radial">Radial by Group</option>
      <option value="grid">Grid by Group</option>
    </select>
    <select id="tighten-intensity" style="background:var(--surface); color:var(--text-secondary); border:1px solid var(--border); border-radius:4px; padding:2px 4px; font-size:10px; font-family:inherit; cursor:pointer;" title="Intensity">
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="4" selected>4x</option>
      <option value="8">8x</option>
      <option value="16">16x</option>
      <option value="32">32x</option>
      <option value="64">64x</option>
      <option value="128">128x</option>
      <option value="256">256x</option>
      <option value="512">512x</option>
      <option value="1024">1024x</option>
    </select>
    <button id="tensions-btn" class="layout-btn" title="Highlight TENSION and NEAR_MISS edges">Tensions</button>
    <button id="heat-btn" class="layout-btn" title="Color nodes by recency of update (heat map)">Heat</button>
    <button id="path-btn" class="layout-btn" title="Find shortest path between two nodes (Shift+click)">Path</button>
  </div>

  <div id="path-status">
    <span id="path-status-text"></span>
  </div>

  <div id="heat-legend">
    <h4>Recency</h4>
    <div class="heat-tier"><span class="heat-dot" style="background:#ef4444"></span> &lt; 6 hours</div>
    <div class="heat-tier"><span class="heat-dot" style="background:#f97316"></span> &lt; 24 hours</div>
    <div class="heat-tier"><span class="heat-dot" style="background:#eab308"></span> &lt; 3 days</div>
    <div class="heat-tier"><span class="heat-dot" style="background:#22c55e"></span> &lt; 1 week</div>
    <div class="heat-tier"><span class="heat-dot" style="background:#06b6d4"></span> &lt; 1 month</div>
    <div class="heat-tier"><span class="heat-dot" style="background:#475569"></span> &gt; 1 month</div>
  </div>

  <div id="search-container">
    <input id="search" type="text" placeholder="Search nodes... (press /)" />
  </div>

  <!-- Load from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/3.0.0/sigma.min.js"></script>

  <script type="module">
    const { Graph } = graphology;

    // ---- Hierarchical color system ----
    // Primary groups get distinct hues spread around the color wheel.
    // Sub-groups within a primary get variations in lightness/saturation.

    const EDGE_PALETTE = [
      "#2a2a3a", "#1e3a5f", "#2d3a1e", "#3a2d1e", "#2d1e3a",
      "#1e3a3a", "#3a1e2d", "#1e2d3a", "#2d1e2d", "#3a3a1e",
      "#1e1e3a", "#3a1e1e",
    ];

    const edgeColors = {};

    // HSL utilities
    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s = Math.max(0, Math.min(100, s));
      l = Math.max(0, Math.min(100, l));
      const a = s * Math.min(l, 100 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l / 100 - a / 100 * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * Math.max(0, Math.min(1, color))).toString(16).padStart(2, "0");
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function hexToHsl(hex) {
      const m = hex.replace("#", "").match(/.{2}/g);
      let r = parseInt(m[0], 16) / 255;
      let g = parseInt(m[1], 16) / 255;
      let b = parseInt(m[2], 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
        else if (max === g) h = ((b - r) / d + 2) / 6;
        else h = ((r - g) / d + 4) / 6;
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    // Build hierarchical color map from data
    // Returns: { "primary": { hue, color, subs: { "sub1": color, "sub2": color } } }
    const groupHierarchy = {};
    const nodeColorCache = {};

    function buildColorHierarchy(nodes, groupProps) {
      // Collect unique primary groups
      const primarySet = new Set();
      const subMap = {}; // primary -> Set of subs

      for (const node of nodes) {
        const groups = node.groups || [node.group || "unknown"];
        const primary = groups[0] || node.group || "unknown";
        primarySet.add(primary);
        if (!subMap[primary]) subMap[primary] = new Set();
        // Sub-group is the combination of remaining levels
        if (groups.length > 1) {
          const sub = groups.slice(1).filter(Boolean).join("/") || primary;
          subMap[primary].add(sub);
        }
      }

      const primaries = [...primarySet].sort();
      const goldenAngle = 137.508; // degrees

      primaries.forEach((primary, i) => {
        // Distribute hues using golden angle for maximum distinctness
        const hue = (i * goldenAngle) % 360;
        const baseSaturation = 65;
        const baseLightness = 55;
        const baseColor = hslToHex(hue, baseSaturation, baseLightness);

        const subs = [...(subMap[primary] || [])].sort();
        const subColors = {};

        if (subs.length <= 1) {
          // Single or no sub-group: use base color
          if (subs.length === 1) subColors[subs[0]] = baseColor;
        } else {
          // Multiple sub-groups: vary lightness and saturation
          subs.forEach((sub, j) => {
            const lightShift = -15 + (30 * j / (subs.length - 1)); // range: -15 to +15
            const satShift = -10 + (20 * j / (subs.length - 1));   // range: -10 to +10
            subColors[sub] = hslToHex(
              hue,
              baseSaturation + satShift,
              baseLightness + lightShift
            );
          });
        }

        groupHierarchy[primary] = {
          hue,
          color: baseColor,
          subs: subColors,
        };
      });
    }

    function getNodeColor(node) {
      const cacheKey = node.id || node.name;
      if (nodeColorCache[cacheKey]) return nodeColorCache[cacheKey];

      const groups = node.groups || [node.group || "unknown"];
      const primary = groups[0] || node.group || "unknown";
      const entry = groupHierarchy[primary];
      if (!entry) {
        nodeColorCache[cacheKey] = "#6b7280";
        return "#6b7280";
      }

      let color = entry.color;
      if (groups.length > 1) {
        const sub = groups.slice(1).filter(Boolean).join("/") || primary;
        if (entry.subs[sub]) color = entry.subs[sub];
      }

      nodeColorCache[cacheKey] = color;
      return color;
    }

    function assignColor(map, key, palette) {
      if (!map[key]) {
        const idx = Object.keys(map).length % palette.length;
        map[key] = palette[idx];
      }
      return map[key];
    }

    const DARK_BG = { r: 6, g: 6, b: 10 }; // #06060a

    // ---- Helpers ----

    function hexToRgb(hex) {
      const m = hex.replace("#", "").match(/.{2}/g);
      return { r: parseInt(m[0], 16), g: parseInt(m[1], 16), b: parseInt(m[2], 16) };
    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, "0")).join("");
    }

    function dimColor(hex, amount) {
      const rgb = hexToRgb(hex);
      return rgbToHex(
        DARK_BG.r + (rgb.r - DARK_BG.r) * amount,
        DARK_BG.g + (rgb.g - DARK_BG.g) * amount,
        DARK_BG.b + (rgb.b - DARK_BG.b) * amount,
      );
    }

    function brightenColor(hex, factor) {
      const rgb = hexToRgb(hex);
      return rgbToHex(rgb.r * factor, rgb.g * factor, rgb.b * factor);
    }

    // ---- State ----
    let selectedNode = null;
    let hoveredNode = null;
    let searchMatches = new Map(); // node -> "name" | "desc"
    let graphData = null;
    let schemaData = null;
    let sigmaInstance = null;
    let graphInstance = null;

    // Filter state: which groups/sub-groups are hidden
    const hiddenGroups = new Set();    // primary groups
    const hiddenSubGroups = new Set(); // "primary/sub" keys
    const hiddenEdgeTypes = new Set(); // edge types to hide
    let highlightTensions = false;     // TENSION edge highlight mode
    let focusedNeighborhood = null;    // node ID whose neighborhood is isolated
    let focusDepth = 1;                // 1, 2, or 3 hops
    let focusedSet = null;             // cached Set of nodes in n-hop neighborhood
    let pathMode = false;              // path finding mode active
    let pathSource = null;             // source node for path finding
    let pathTarget = null;             // target node for path finding
    let pathNodes = new Set();         // nodes in the found path
    let pathEdges = new Set();         // edge IDs in the found path
    let shiftHeld = false;             // track Shift key state globally
    let heatMode = false;              // temporal heat map mode

    // ---- Heat map coloring ----
    const HEAT_GRADIENT = [
      { maxAge: 6 * 3600000,    color: "#ef4444", label: "< 6h" },    // hot red
      { maxAge: 24 * 3600000,   color: "#f97316", label: "< 24h" },   // orange
      { maxAge: 3 * 86400000,   color: "#eab308", label: "< 3d" },    // yellow
      { maxAge: 7 * 86400000,   color: "#22c55e", label: "< 1w" },    // green
      { maxAge: 30 * 86400000,  color: "#06b6d4", label: "< 1mo" },   // cyan
      { maxAge: Infinity,       color: "#475569", label: "> 1mo" },    // slate
    ];

    function getHeatColor(updatedAt) {
      if (!updatedAt) return HEAT_GRADIENT[HEAT_GRADIENT.length - 1].color;
      const age = Date.now() - new Date(updatedAt).getTime();
      for (const tier of HEAT_GRADIENT) {
        if (age < tier.maxAge) return tier.color;
      }
      return HEAT_GRADIENT[HEAT_GRADIENT.length - 1].color;
    }

    // ---- Build graph ----

    function buildGraph(data, targetGraph) {
      const graph = targetGraph || new Graph();
      if (targetGraph) graph.clear();

      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      let i = 0;

      for (const node of data.nodes) {
        const angle = i * goldenAngle;
        const radius = Math.sqrt(i + 1) * 20;
        const color = getNodeColor(node);
        const groups = node.groups || [node.group || "unknown"];

        graph.mergeNode(node.id, {
          label: node.name.length > 40 ? node.name.split(":").slice(-1)[0] : node.name,
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
          size: 4,
          color: color,
          _name: node.name,
          _group: node.group,
          _groups: groups,
          _prefix: node.prefix,
          _description: node.description,
          _properties: node.properties,
          _labels: node.labels,
          _created_at: node.created_at,
          _updated_at: node.updated_at,
        });
        i++;
      }

      // Compute degree for sizing
      const degreeMap = {};
      for (const edge of data.edges) {
        degreeMap[edge.source] = (degreeMap[edge.source] || 0) + 1;
        degreeMap[edge.target] = (degreeMap[edge.target] || 0) + 1;
      }

      graph.forEachNode((node, attrs) => {
        const degree = degreeMap[node] || 0;
        const size = Math.max(3, Math.min(20, 3 + Math.sqrt(degree) * 2));
        graph.setNodeAttribute(node, "size", size);
        graph.setNodeAttribute(node, "_degree", degree);
      });

      // Add edges
      let edgeIdx = 0;
      for (const edge of data.edges) {
        if (!graph.hasNode(edge.source) || !graph.hasNode(edge.target)) continue;

        const edgeColor = assignColor(edgeColors, edge.type, EDGE_PALETTE);
        const curvature = 0.12 + Math.random() * 0.08;

        try {
          graph.addEdgeWithKey(`e${edgeIdx}`, edge.source, edge.target, {
            label: edge.type,
            color: edgeColor,
            size: edge.type === "TENSION" ? 2 : edge.type === "NEAR_MISS" ? 1.5 : 0.5,
            type: "curved",
            curvature: curvature,
            _relType: edge.type,
            _context: edge.context,
          });
        } catch (_) {
          // Parallel edges: silently skip
        }
        edgeIdx++;
      }

      return graph;
    }

    // ---- Check if node is hidden by filter ----
    function isNodeHidden(attrs) {
      const groups = attrs._groups || [attrs._group || "unknown"];
      const primary = groups[0] || "unknown";

      // Check if entire primary group is hidden
      if (hiddenGroups.has(primary)) return true;

      // Check if specific sub-group is hidden
      if (groups.length > 1) {
        const sub = groups.slice(1).filter(Boolean).join("/") || primary;
        const key = `${primary}/${sub}`;
        if (hiddenSubGroups.has(key)) return true;
      }

      return false;
    }

    // ---- Path finding ----

    function findShortestPath(graph, source, target) {
      if (source === target) return { nodes: [source], edges: [] };

      const visited = new Set([source]);
      const parent = new Map();
      const queue = [source];

      while (queue.length > 0) {
        const current = queue.shift();

        for (const neighbor of graph.neighbors(current)) {
          if (visited.has(neighbor)) continue;
          if (isNodeHidden(graph.getNodeAttributes(neighbor))) continue;

          visited.add(neighbor);

          // Find the connecting edge
          let edgeId = null;
          graph.forEachEdge(current, (e, attrs, src, tgt) => {
            if (!edgeId && ((src === current && tgt === neighbor) || (src === neighbor && tgt === current))) {
              edgeId = e;
            }
          });

          parent.set(neighbor, { node: current, edge: edgeId });

          if (neighbor === target) {
            const nodePath = [target];
            const edgePath = [];
            let curr = target;
            while (parent.has(curr)) {
              const p = parent.get(curr);
              if (p.edge) edgePath.unshift(p.edge);
              nodePath.unshift(p.node);
              curr = p.node;
            }
            return { nodes: nodePath, edges: edgePath };
          }

          queue.push(neighbor);
        }
      }

      return null;
    }

    // ---- N-hop neighborhood ----
    function computeFocusedSet(graph, center, depth) {
      const visited = new Set([center]);
      let frontier = [center];
      for (let d = 0; d < depth; d++) {
        const nextFrontier = [];
        for (const node of frontier) {
          graph.neighbors(node).forEach(n => {
            if (!visited.has(n)) {
              const attrs = graph.getNodeAttributes(n);
              if (!attrs.hidden && !isNodeHidden(attrs)) {
                visited.add(n);
                nextFrontier.push(n);
              }
            }
          });
        }
        frontier = nextFrontier;
        if (frontier.length === 0) break; // no more to expand
      }
      return visited;
    }

    function updateFocusedSet() {
      if (focusedNeighborhood && graphInstance) {
        focusedSet = computeFocusedSet(graphInstance, focusedNeighborhood, focusDepth);
      } else {
        focusedSet = null;
      }
    }
