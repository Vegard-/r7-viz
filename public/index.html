    // Barnes-Hut quadtree for O(n log n) repulsion
    class BHNode {
      constructor(x, y, w, h) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.cx = 0; this.cy = 0; this.mass = 0; this.size = 0;
        this.children = null;
        this.bodyIdx = -1;
      }
      insert(idx, nx, ny, ns) {
        if (this.mass === 0) {
          this.bodyIdx = idx;
          this.cx = nx; this.cy = ny; this.mass = 1; this.size = ns;
          return;
        }
        if (!this.children) {
          const hw = this.w / 2, hh = this.h / 2;
          this.children = [
            new BHNode(this.x, this.y, hw, hh),
            new BHNode(this.x + hw, this.y, hw, hh),
            new BHNode(this.x, this.y + hh, hw, hh),
            new BHNode(this.x + hw, this.y + hh, hw, hh)
          ];
          this._place(this.bodyIdx, this.cx, this.cy, this.size);
          this.bodyIdx = -1;
        }
        this._place(idx, nx, ny, ns);
        const tm = this.mass + 1;
        this.cx = (this.cx * this.mass + nx) / tm;
        this.cy = (this.cy * this.mass + ny) / tm;
        this.size = (this.size * this.mass + ns) / tm;
        this.mass = tm;
      }
      _place(idx, nx, ny, ns) {
        const hw = this.w / 2, hh = this.h / 2;
        const col = nx < this.x + hw ? 0 : 1;
        const row = ny < this.y + hh ? 0 : 1;
        this.children[row * 2 + col].insert(idx, nx, ny, ns);
      }
      repulse(idx, nx, ny, ns, fx, theta, sr) {
        if (this.mass === 0) return;
        const dx = nx - this.cx, dy = ny - this.cy;
        const d2 = dx * dx + dy * dy;
        if (d2 < 0.0001) return;
        if (!this.children || (this.w * this.w / d2 < theta * theta)) {
          if (this.bodyIdx === idx) return;
          const dist = Math.sqrt(d2);
          const f = sr * ns * this.size * this.mass / dist;
          fx.x += (dx / dist) * f;
          fx.y += (dy / dist) * f;
          return;
        }
        for (const c of this.children) c.repulse(idx, nx, ny, ns, fx, theta, sr);
      }
    }

    async function runForceAtlas2(graph, iterations = 300, onProgress) {
      const nodes = [];
      graph.forEachNode((id, attrs) => {
        nodes.push({ id, x: attrs.x, y: attrs.y, size: attrs.size || 4 });
      });

      const nodeIndex = {};
      nodes.forEach((n, i) => nodeIndex[n.id] = i);

      const edges = [];
      graph.forEachEdge((edge, attrs, source, target) => {
        if (nodeIndex[source] !== undefined && nodeIndex[target] !== undefined) {
          edges.push({ source: nodeIndex[source], target: nodeIndex[target] });
        }
      });

      const gravity = 0.8;
      const scalingRatio = 15;
      const slowDown = 1;
      const theta = 1.2; // Barnes-Hut threshold (higher = faster, less accurate)
      const effectiveIter = iterations;
      const CHUNK_SIZE = Math.max(5, Math.min(30, Math.floor(150 / Math.max(1, nodes.length / 500))));

      for (let iter = 0; iter < effectiveIter; iter++) {
        const forces = nodes.map(() => ({ x: 0, y: 0 }));

        // Build quadtree bounding box
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const n of nodes) {
          if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x;
          if (n.y < minY) minY = n.y; if (n.y > maxY) maxY = n.y;
        }
        const pad = Math.max(maxX - minX, maxY - minY) * 0.01 + 1;
        const side = Math.max(maxX - minX, maxY - minY) + pad * 2;
        const tree = new BHNode(minX - pad, minY - pad, side, side);
        for (let i = 0; i < nodes.length; i++) {
          tree.insert(i, nodes[i].x, nodes[i].y, nodes[i].size);
        }

        // Repulsion via Barnes-Hut
        for (let i = 0; i < nodes.length; i++) {
          tree.repulse(i, nodes[i].x, nodes[i].y, nodes[i].size, forces[i], theta, scalingRatio);
        }

        // Attraction
        for (const edge of edges) {
          const dx = nodes[edge.target].x - nodes[edge.source].x;
          const dy = nodes[edge.target].y - nodes[edge.source].y;
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
          const attraction = dist / scalingRatio;
          forces[edge.source].x += (dx / dist) * attraction;
          forces[edge.source].y += (dy / dist) * attraction;
          forces[edge.target].x -= (dx / dist) * attraction;
          forces[edge.target].y -= (dy / dist) * attraction;
        }

        // Gravity
        for (let i = 0; i < nodes.length; i++) {
          const dist = Math.sqrt(nodes[i].x * nodes[i].x + nodes[i].y * nodes[i].y);
          if (dist > 0) {
            forces[i].x -= gravity * nodes[i].x / dist * nodes[i].size;
            forces[i].y -= gravity * nodes[i].y / dist * nodes[i].size;
          }
        }

        // Apply forces with cooling
        const cooling = 1 - (iter / effectiveIter) * 0.5;
        for (let i = 0; i < nodes.length; i++) {
          const speed = (1 / (1 + Math.sqrt(forces[i].x * forces[i].x + forces[i].y * forces[i].y))) * cooling / slowDown;
          nodes[i].x += forces[i].x * speed;
          nodes[i].y += forces[i].y * speed;
        }

        // Yield to event loop periodically for progress updates and UI responsiveness
        if (iter % CHUNK_SIZE === 0 && iter > 0) {
          const pct = Math.round((iter / effectiveIter) * 100);
          if (onProgress) onProgress(pct);
          await new Promise(r => requestAnimationFrame(r));
        }
      }

      for (const node of nodes) {
        graph.setNodeAttribute(node.id, "x", node.x);
        graph.setNodeAttribute(node.id, "y", node.y);
      }
    }

    // ---- Alternative layout algorithms ----

    // Group-Attract: ForceAtlas2 + extra intra-group attraction
    async function runGroupAttract(graph, iterations, onProgress) {
      const nodes = [];
      graph.forEachNode((id, attrs) => {
        nodes.push({ id, x: attrs.x, y: attrs.y, size: attrs.size || 4 });
      });
      const nodeIndex = {};
      nodes.forEach((n, i) => nodeIndex[n.id] = i);

      // Build group map from main graph
      const nodeGroup = {};
      for (const n of nodes) {
        const attrs = graphInstance.getNodeAttributes(n.id);
        nodeGroup[n.id] = (attrs._groups || [attrs._group || "unknown"])[0];
      }

      const edges = [];
      graph.forEachEdge((edge, attrs, source, target) => {
        if (nodeIndex[source] !== undefined && nodeIndex[target] !== undefined) {
          edges.push({ source: nodeIndex[source], target: nodeIndex[target] });
        }
      });

      const gravity = 0.8;
      const scalingRatio = 15;
      const groupAttraction = 0.15;
      const theta = 1.2;
      const CHUNK_SIZE = Math.max(5, Math.min(30, Math.floor(150 / Math.max(1, nodes.length / 500))));

      for (let iter = 0; iter < iterations; iter++) {
        const forces = nodes.map(() => ({ x: 0, y: 0 }));

        // Compute group centroids
        const groupCentroids = {};
        const groupCounts = {};
        for (let i = 0; i < nodes.length; i++) {
          const g = nodeGroup[nodes[i].id];
          if (!groupCentroids[g]) { groupCentroids[g] = { x: 0, y: 0 }; groupCounts[g] = 0; }
          groupCentroids[g].x += nodes[i].x;
          groupCentroids[g].y += nodes[i].y;
          groupCounts[g]++;
        }
        for (const g in groupCentroids) {
          groupCentroids[g].x /= groupCounts[g];
          groupCentroids[g].y /= groupCounts[g];
        }

        // Barnes-Hut repulsion
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const n of nodes) {
          if (n.x < minX) minX = n.x; if (n.x > maxX) maxX = n.x;
          if (n.y < minY) minY = n.y; if (n.y > maxY) maxY = n.y;
        }
        const pad = Math.max(maxX - minX, maxY - minY) * 0.01 + 1;
        const side = Math.max(maxX - minX, maxY - minY) + pad * 2;
        const tree = new BHNode(minX - pad, minY - pad, side, side);
        for (let i = 0; i < nodes.length; i++) {
          tree.insert(i, nodes[i].x, nodes[i].y, nodes[i].size);
        }
        for (let i = 0; i < nodes.length; i++) {
          tree.repulse(i, nodes[i].x, nodes[i].y, nodes[i].size, forces[i], theta, scalingRatio);
        }

        // Edge attraction
        for (const edge of edges) {
          const dx = nodes[edge.target].x - nodes[edge.source].x;
          const dy = nodes[edge.target].y - nodes[edge.source].y;
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
          const attraction = dist / scalingRatio;
          forces[edge.source].x += (dx / dist) * attraction;
          forces[edge.source].y += (dy / dist) * attraction;
          forces[edge.target].x -= (dx / dist) * attraction;
          forces[edge.target].y -= (dy / dist) * attraction;
        }

        // Gravity + group attraction
        for (let i = 0; i < nodes.length; i++) {
          const dist = Math.sqrt(nodes[i].x * nodes[i].x + nodes[i].y * nodes[i].y);
          if (dist > 0) {
            forces[i].x -= gravity * nodes[i].x / dist * nodes[i].size;
            forces[i].y -= gravity * nodes[i].y / dist * nodes[i].size;
          }
          // Pull toward group centroid
          const g = nodeGroup[nodes[i].id];
          const c = groupCentroids[g];
          if (c) {
            forces[i].x += groupAttraction * (c.x - nodes[i].x);
            forces[i].y += groupAttraction * (c.y - nodes[i].y);
          }
        }

        const cooling = 1 - (iter / iterations) * 0.5;
        for (let i = 0; i < nodes.length; i++) {
          const speed = (1 / (1 + Math.sqrt(forces[i].x * forces[i].x + forces[i].y * forces[i].y))) * cooling;
          nodes[i].x += forces[i].x * speed;
          nodes[i].y += forces[i].y * speed;
        }

        if (iter % CHUNK_SIZE === 0 && iter > 0) {
          const pct = Math.round((iter / iterations) * 100);
          if (onProgress) onProgress(pct);
          await new Promise(r => requestAnimationFrame(r));
        }
      }

      for (const node of nodes) {
        graph.setNodeAttribute(node.id, "x", node.x);
        graph.setNodeAttribute(node.id, "y", node.y);
      }
    }

    // Fruchterman-Reingold: classic spring-electrical model with uniform spacing
    async function runFruchtermanReingold(graph, iterations, onProgress) {
      const nodes = [];
      graph.forEachNode((id, attrs) => {
        nodes.push({ id, x: attrs.x, y: attrs.y });
      });
      const nodeIndex = {};
      nodes.forEach((n, i) => nodeIndex[n.id] = i);

      const edges = [];
      graph.forEachEdge((edge, attrs, source, target) => {
        if (nodeIndex[source] !== undefined && nodeIndex[target] !== undefined) {
          edges.push({ source: nodeIndex[source], target: nodeIndex[target] });
        }
      });

      const area = nodes.length * 100;
      const k = Math.sqrt(area / Math.max(nodes.length, 1));
      let temperature = Math.sqrt(area) * 0.1;
      const CHUNK_SIZE = Math.max(5, Math.min(30, Math.floor(150 / Math.max(1, nodes.length / 500))));

      for (let iter = 0; iter < iterations; iter++) {
        const disp = nodes.map(() => ({ x: 0, y: 0 }));

        // Repulsion between all pairs (O(n^2) — fine for our graph sizes)
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
            const force = (k * k) / dist;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            disp[i].x += fx; disp[i].y += fy;
            disp[j].x -= fx; disp[j].y -= fy;
          }
        }

        // Attraction along edges
        for (const edge of edges) {
          const dx = nodes[edge.target].x - nodes[edge.source].x;
          const dy = nodes[edge.target].y - nodes[edge.source].y;
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
          const force = (dist * dist) / k;
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          disp[edge.source].x += fx; disp[edge.source].y += fy;
          disp[edge.target].x -= fx; disp[edge.target].y -= fy;
        }

        // Apply with temperature limiting
        for (let i = 0; i < nodes.length; i++) {
          const dist = Math.sqrt(disp[i].x * disp[i].x + disp[i].y * disp[i].y) + 0.01;
          const cappedDist = Math.min(dist, temperature);
          nodes[i].x += (disp[i].x / dist) * cappedDist;
          nodes[i].y += (disp[i].y / dist) * cappedDist;
        }

        temperature *= (1 - iter / iterations);

        if (iter % CHUNK_SIZE === 0 && iter > 0) {
          const pct = Math.round((iter / iterations) * 100);
          if (onProgress) onProgress(pct);
          await new Promise(r => requestAnimationFrame(r));
        }
      }

      for (const node of nodes) {
        graph.setNodeAttribute(node.id, "x", node.x);
        graph.setNodeAttribute(node.id, "y", node.y);
      }
    }

    // Circular by Group: each group forms a circle, groups arranged in a ring
    function layoutCircularByGroup(graph) {
      const groups = {};
      graph.forEachNode((id, attrs) => {
        const mainAttrs = graphInstance.getNodeAttributes(id);
        const g = (mainAttrs._groups || [mainAttrs._group || "unknown"])[0];
        if (!groups[g]) groups[g] = [];
        groups[g].push(id);
      });

      const groupNames = Object.keys(groups).sort();
      const outerRadius = Math.max(80, groupNames.length * 60);

      groupNames.forEach((g, gi) => {
        const groupAngle = (2 * Math.PI * gi) / groupNames.length;
        const cx = Math.cos(groupAngle) * outerRadius;
        const cy = Math.sin(groupAngle) * outerRadius;
        const members = groups[g];
        const innerRadius = Math.max(20, members.length * 8);

        members.forEach((id, ni) => {
          const nodeAngle = (2 * Math.PI * ni) / members.length;
          graph.setNodeAttribute(id, "x", cx + Math.cos(nodeAngle) * innerRadius);
          graph.setNodeAttribute(id, "y", cy + Math.sin(nodeAngle) * innerRadius);
        });
      });
    }

    // Radial by Group: groups on spokes radiating from center
    function layoutRadialByGroup(graph) {
      const groups = {};
      graph.forEachNode((id, attrs) => {
        const mainAttrs = graphInstance.getNodeAttributes(id);
        const g = (mainAttrs._groups || [mainAttrs._group || "unknown"])[0];
        if (!groups[g]) groups[g] = [];
        groups[g].push(id);
      });

      const groupNames = Object.keys(groups).sort();

      groupNames.forEach((g, gi) => {
        const spokeAngle = (2 * Math.PI * gi) / groupNames.length;
        const members = groups[g];
        const spread = Math.PI * 0.15; // angular spread within spoke

        members.forEach((id, ni) => {
          const t = members.length > 1 ? ni / (members.length - 1) : 0.5;
          const angle = spokeAngle + (t - 0.5) * spread;
          const radius = 60 + ni * 25;
          graph.setNodeAttribute(id, "x", Math.cos(angle) * radius);
          graph.setNodeAttribute(id, "y", Math.sin(angle) * radius);
        });
      });
    }

    // Grid by Group: groups in a grid, nodes within each group in a mini-grid
    function layoutGridByGroup(graph) {
      const groups = {};
      graph.forEachNode((id, attrs) => {
        const mainAttrs = graphInstance.getNodeAttributes(id);
        const g = (mainAttrs._groups || [mainAttrs._group || "unknown"])[0];
        if (!groups[g]) groups[g] = [];
        groups[g].push(id);
      });

      const groupNames = Object.keys(groups).sort();
      const cols = Math.ceil(Math.sqrt(groupNames.length));
      const cellSize = 200;

      groupNames.forEach((g, gi) => {
        const gRow = Math.floor(gi / cols);
        const gCol = gi % cols;
        const basex = gCol * cellSize;
        const basey = gRow * cellSize;
        const members = groups[g];
        const innerCols = Math.ceil(Math.sqrt(members.length));
        const spacing = cellSize / (innerCols + 1);

        members.forEach((id, ni) => {
          const nRow = Math.floor(ni / innerCols);
          const nCol = ni % innerCols;
          graph.setNodeAttribute(id, "x", basex + (nCol + 0.5) * spacing);
          graph.setNodeAttribute(id, "y", basey + (nRow + 0.5) * spacing);
        });
      });
    }

    // ---- Re-layout visible nodes ----

    // Store original positions so we can reset
    const originalPositions = {};

    function saveOriginalPositions() {
      graphInstance.forEachNode((node, attrs) => {
        originalPositions[node] = { x: attrs.x, y: attrs.y };
      });
    }

    function restoreOriginalPositions() {
      graphInstance.forEachNode((node) => {
        const pos = originalPositions[node];
        if (pos) {
          graphInstance.setNodeAttribute(node, "x", pos.x);
          graphInstance.setNodeAttribute(node, "y", pos.y);
        }
      });
      sigmaInstance.refresh();
    }

    async function relayoutVisible() {
      if (!graphInstance || !sigmaInstance) return;

      // Build a subgraph of only visible nodes
      const visibleNodes = [];
      graphInstance.forEachNode((node, attrs) => {
        if (!isNodeHidden(attrs)) {
          visibleNodes.push(node);
        }
      });

      if (visibleNodes.length === 0) return;

      const btn = document.getElementById("tighten-btn");
      btn.disabled = true;
      const method = document.getElementById("tighten-method").value;
      const methodNames = {
        "forceatlas2": "ForceAtlas2",
        "group-attract": "Group-Attract",
        "fruchterman": "Fruchterman-Reingold",
        "circular": "Circular",
        "radial": "Radial",
        "grid": "Grid",
      };
      showProgress(`${methodNames[method] || method}...`);
      // Yield so browser paints the overlay before layout blocks the thread
      await new Promise(r => requestAnimationFrame(r));

      const visibleSet = new Set(visibleNodes);

      // Create a temporary graph with only visible nodes
      const tempGraph = new Graph();
      for (const node of visibleNodes) {
        const attrs = graphInstance.getNodeAttributes(node);
        tempGraph.addNode(node, { x: attrs.x, y: attrs.y, size: attrs.size || 4 });
      }

      // Add edges between visible nodes
      graphInstance.forEachEdge((edge, attrs, source, target) => {
        if (visibleSet.has(source) && visibleSet.has(target)) {
          try {
            tempGraph.addEdge(source, target);
          } catch (_) {}
        }
      });

      const intensity = parseInt(document.getElementById("tighten-intensity").value) || 4;
      const tightenIter = 100 * intensity;

      switch (method) {
        case "forceatlas2":
          await runForceAtlas2(tempGraph, tightenIter, (pct) => {
            updateProgress(pct, `ForceAtlas2 ${intensity}x... ${pct}%`);
          });
          break;
        case "group-attract":
          await runGroupAttract(tempGraph, tightenIter, (pct) => {
            updateProgress(pct, `Group-Attract ${intensity}x... ${pct}%`);
          });
          break;
        case "fruchterman":
          await runFruchtermanReingold(tempGraph, tightenIter, (pct) => {
            updateProgress(pct, `Fruchterman-Reingold ${intensity}x... ${pct}%`);
          });
          break;
        case "circular":
          layoutCircularByGroup(tempGraph);
          break;
        case "radial":
          layoutRadialByGroup(tempGraph);
          break;
        case "grid":
          layoutGridByGroup(tempGraph);
          break;
      }

      // Apply new positions back to the main graph
      tempGraph.forEachNode((node, attrs) => {
        graphInstance.setNodeAttribute(node, "x", attrs.x);
        graphInstance.setNodeAttribute(node, "y", attrs.y);
      });

      hideProgress();
      btn.disabled = false;
      sigmaInstance.refresh();
    }


    // ---- Refresh ----

    async function refreshGraph() {
      const btn = document.getElementById("refresh-btn");
      const origText = btn.innerHTML;
      btn.textContent = "...";
      btn.disabled = true;
      showProgress("Fetching data...");
      try {
        const [schemaRes, graphRes] = await Promise.all([
          fetch("/api/schema"),
          fetch("/api/graph"),
        ]);
        schemaData = await schemaRes.json();
        graphData = await graphRes.json();

        updateProgress(20, "Building graph...");

        // Clear caches
        for (const k in nodeColorCache) delete nodeColorCache[k];
        for (const k in groupHierarchy) delete groupHierarchy[k];

        const groupProps = schemaData.config?.GROUP_PROPS || ["channel"];
        buildColorHierarchy(graphData.nodes, groupProps);

        // Rebuild graph in place (Sigma observes mutations)
        buildGraph(graphData, graphInstance);
        updateProgress(30, "Laying out...");
        await runForceAtlas2(graphInstance, 400, (pct) => {
          updateProgress(30 + Math.round(pct * 0.65), `Laying out... ${pct}%`);
        });
        saveOriginalPositions();

        // Update stats
        const primaryGroups = [...new Set(graphData.nodes.map(n => (n.groups || [n.group])[0] || "unknown"))];
        document.getElementById("node-count").textContent = graphData.nodes.length;
        document.getElementById("edge-count").textContent = graphData.edges.length;
        document.getElementById("channel-count").textContent = primaryGroups.length;
        buildLegend(graphData, groupProps);

        // Reset interaction state
        selectedNode = null;
        hoveredNode = null;
        searchMatches = new Map();
        hiddenGroups.clear();
        hiddenSubGroups.clear();
        hiddenEdgeTypes.clear();
        highlightTensions = false;
        focusedNeighborhood = null;
        focusDepth = 1;
        focusedSet = null;
        exitPathMode();
        document.getElementById("tensions-btn").classList.remove("active");
        document.getElementById("focus-btn").textContent = "Focus";
        document.getElementById("search").value = "";
        hideDetail();
        sigmaInstance.refresh();
      } catch (err) {
        console.error("Refresh failed:", err);
      } finally {
        hideProgress();
        btn.innerHTML = origText;
        btn.disabled = false;
      }
    }

    // ---- Render ----

    async function init() {
      showProgress("Fetching data...");
      const [schemaRes, graphRes] = await Promise.all([
        fetch("/api/schema"),
        fetch("/api/graph"),
      ]);
      schemaData = await schemaRes.json();
      graphData = await graphRes.json();

      // Build hierarchical color map
      const groupProps = schemaData.config?.GROUP_PROPS || ["channel"];
      buildColorHierarchy(graphData.nodes, groupProps);

      // Update stats
      const primaryLabel = groupProps[0] || "group";
      const primaryGroups = [...new Set(graphData.nodes.map(n => {
        const groups = n.groups || [n.group || "unknown"];
        return groups[0] || "unknown";
      }))];
      document.getElementById("node-count").textContent = graphData.nodes.length;
      document.getElementById("edge-count").textContent = graphData.edges.length;
      document.getElementById("channel-count").textContent = primaryGroups.length;
      document.getElementById("group-label").textContent =
        primaryLabel.charAt(0).toUpperCase() + primaryLabel.slice(1) + "s";

      // Build graph
      updateProgress(20, "Building graph...");
      graphInstance = buildGraph(graphData);
      updateProgress(30, "Laying out...");
      await runForceAtlas2(graphInstance, 400, (pct) => {
        updateProgress(30 + Math.round(pct * 0.65), `Laying out... ${pct}%`);
      });
      saveOriginalPositions();

      // Build legend
      buildLegend(graphData, groupProps);

      // Dynamic label/performance settings based on graph size
      const nodeCount = graphData.nodes.length;
      const edgeCount = graphData.edges.length;
      const isLarge = nodeCount > 500;
      const isVeryLarge = nodeCount > 2000;

      // Scale label visibility: larger graphs show fewer labels until zoomed in
      const dynamicLabelThreshold = isVeryLarge ? 14 : isLarge ? 10 : 7;
      const dynamicLabelDensity = isVeryLarge ? 0.02 : isLarge ? 0.04 : 0.07;
      const dynamicLabelGridCell = isVeryLarge ? 200 : isLarge ? 120 : 80;
      // Edge labels are the biggest perf cost — disable for large graphs
      const showEdgeLabels = !isLarge;

      // Initialize Sigma
      const container = document.getElementById("graph-container");
      sigmaInstance = new Sigma(graphInstance, container, {
        edgeProgramClasses: {
          curved: Sigma.rendering.EdgeCurveProgram,
        },
        renderLabels: true,
        labelFont: "JetBrains Mono, SF Mono, monospace",
        labelSize: 11,
        labelWeight: "500",
        labelColor: { color: "#e4e4ed" },
        labelRenderedSizeThreshold: dynamicLabelThreshold,
        labelDensity: dynamicLabelDensity,
        labelGridCellSize: dynamicLabelGridCell,
        defaultNodeColor: "#6b7280",
        defaultEdgeColor: "#1a1a2a",
        minCameraRatio: 0.01,
        maxCameraRatio: 50,
        hideEdgesOnMove: isLarge,
        hideLabelsOnMove: isLarge,
        zIndex: true,
        renderEdgeLabels: showEdgeLabels,
        edgeLabelSize: 9,
        edgeLabelColor: { color: "#5a5a70" },
        nodeReducer: (node, data) => {
          const res = { ...data };

          // Group filtering
          if (isNodeHidden(data)) {
            res.hidden = true;
            return res;
          }

          if (data.hidden) { res.hidden = true; return res; }

          // Heat map mode: override base color by recency
          if (heatMode) {
            res.color = getHeatColor(data._updated_at);
          }

          // Path mode
          if (pathNodes.size > 0) {
            if (pathNodes.has(node)) {
              const isEndpoint = node === pathSource || node === pathTarget;
              res.color = isEndpoint ? "#06b6d4" : "#0ea5e9";
              res.size = (data.size || 4) * (isEndpoint ? 2.2 : 1.6);
              res.zIndex = 3;
              res.highlighted = true;
            } else {
              res.color = dimColor(res.color || "#6b7280", 0.12);
              res.size = (data.size || 4) * 0.4;
              res.zIndex = 0;
            }
            return res;
          }

          // Neighborhood focus mode (n-hop)
          if (focusedNeighborhood && focusedSet) {
            const isCenter = node === focusedNeighborhood;
            const inSet = focusedSet.has(node);
            if (isCenter) {
              res.size = (data.size || 4) * 2;
              res.zIndex = 3;
              res.highlighted = true;
            } else if (inSet) {
              res.size = (data.size || 4) * 1.3;
              res.zIndex = 2;
            } else {
              res.hidden = true;
            }
            return res;
          }

          // TENSION / NEAR_MISS highlight mode
          if (highlightTensions) {
            let tensionType = null;
            graphInstance.edges(node).some(e => {
              const a = graphInstance.getEdgeAttributes(e);
              if (a._relType === "TENSION") { tensionType = "TENSION"; return true; }
              if (a._relType === "NEAR_MISS") { tensionType = tensionType || "NEAR_MISS"; }
              return false;
            });
            if (tensionType) {
              res.color = tensionType === "TENSION" ? "#ef4444" : "#f59e0b";
              res.size = (data.size || 4) * 2;
              res.zIndex = 3;
              res.highlighted = true;
            } else {
              res.color = dimColor(res.color || "#6b7280", 0.15);
              res.size = (data.size || 4) * 0.5;
              res.zIndex = 0;
            }
            return res;
          }

          // Search mode
          if (searchMatches.size > 0) {
            const matchType = searchMatches.get(node);
            if (matchType === "name") {
              res.color = "#06b6d4";
              res.size = (data.size || 4) * 2.2;
              res.zIndex = 3;
              res.highlighted = true;
            } else if (matchType === "desc") {
              res.color = "#0c4a5e";
              res.size = (data.size || 4) * 0.9;
              res.zIndex = 2;
            } else {
              res.color = dimColor(res.color || "#6b7280", 0.15);
              res.size = (data.size || 4) * 0.5;
              res.zIndex = 0;
            }
            return res;
          }

          // Selection mode
          if (selectedNode) {
            if (node === selectedNode) {
              res.size = (data.size || 4) * 1.8;
              res.zIndex = 3;
              res.highlighted = true;
            } else if (graphInstance.hasEdge(node, selectedNode) || graphInstance.hasEdge(selectedNode, node)) {
              res.size = (data.size || 4) * 1.3;
              res.zIndex = 2;
            } else {
              res.color = dimColor(res.color || "#6b7280", 0.2);
              res.size = (data.size || 4) * 0.5;
              res.zIndex = 0;
            }
            return res;
          }

          // Hover mode
          if (hoveredNode) {
            if (node === hoveredNode) {
              res.size = (data.size || 4) * 1.5;
              res.zIndex = 3;
              res.highlighted = true;
            } else if (graphInstance.hasEdge(node, hoveredNode) || graphInstance.hasEdge(hoveredNode, node)) {
              res.size = (data.size || 4) * 1.2;
              res.zIndex = 2;
            } else {
              res.color = dimColor(res.color || "#6b7280", 0.3);
              res.size = (data.size || 4) * 0.7;
              res.zIndex = 0;
            }
          }

          return res;
        },
        edgeReducer: (edge, data) => {
          const res = { ...data };
          const [source, target] = graphInstance.extremities(edge);

          // Hide edges connected to hidden nodes
          const sourceAttrs = graphInstance.getNodeAttributes(source);
          const targetAttrs = graphInstance.getNodeAttributes(target);
          if (isNodeHidden(sourceAttrs) || isNodeHidden(targetAttrs)) {
            res.hidden = true;
            return res;
          }

          // Path mode
          if (pathNodes.size > 0) {
            if (pathEdges.has(edge)) {
              res.color = "#06b6d4";
              res.size = 4;
              res.zIndex = 10;
              res.label = data._relType || "";
              res.forceLabel = true;
            } else {
              res.color = dimColor(data.color || "#1a1a2a", 0.05);
              res.size = 0.15;
              res.zIndex = 0;
            }
            return res;
          }

          // Neighborhood focus mode (n-hop)
          if (focusedNeighborhood && focusedSet) {
            if (focusedSet.has(source) && focusedSet.has(target)) {
              // Edges directly connected to center get brighter treatment
              const touchesCenter = source === focusedNeighborhood || target === focusedNeighborhood;
              res.color = brightenColor(data.color || "#2a2a3a", touchesCenter ? 2 : 1.5);
              res.size = Math.max(2, (data.size || 0.5) * (touchesCenter ? 3 : 2));
              res.zIndex = touchesCenter ? 2 : 1;
              res.label = data._relType || "";
              res.forceLabel = touchesCenter;
            } else {
              res.hidden = true;
            }
            return res;
          }

          // Hide filtered edge types
          if (hiddenEdgeTypes.has(data._relType)) {
            res.hidden = true;
            return res;
          }

          // TENSION / NEAR_MISS highlight mode
          if (highlightTensions) {
            if (data._relType === "TENSION" || data._relType === "NEAR_MISS") {
              res.color = data._relType === "TENSION" ? "#ef4444" : "#f59e0b";
              res.size = 4;
              res.zIndex = 10;
              res.label = data._relType || "";
              res.forceLabel = true;
            } else {
              res.color = dimColor(data.color || "#1a1a2a", 0.08);
              res.size = 0.2;
              res.zIndex = 0;
            }
            return res;
          }

          if (searchMatches.size > 0) {
            if (searchMatches.has(source) && searchMatches.has(target)) {
              res.color = "#06b6d4";
              res.size = 2;
              res.zIndex = 2;
              res.label = data._relType || "";
              res.forceLabel = true;
            } else {
              res.color = dimColor(data.color || "#1a1a2a", 0.05);
              res.size = 0.2;
              res.zIndex = 0;
            }
            return res;
          }

          const active = selectedNode || hoveredNode;
          if (active) {
            if (source === active || target === active) {
              res.color = brightenColor(data.color || "#2a2a3a", 2);
              res.size = Math.max(2, (data.size || 0.5) * 4);
              res.zIndex = 2;
              res.label = data._relType || "";
              res.forceLabel = true;
            } else {
              res.color = dimColor(data.color || "#1a1a2a", 0.08);
              res.size = 0.2;
              res.zIndex = 0;
            }
          }

          return res;
        },
        defaultDrawNodeHover: (context, data, settings) => {
          const label = data.label;
          if (!label) return;

          const size = 11;
          const descSize = 9;
          const font = "JetBrains Mono, SF Mono, monospace";
          context.font = `500 ${size}px ${font}`;

          const fullName = data._name || label;
          const nameWidth = context.measureText(fullName).width;
          const nodeSize = data.size || 4;
          const paddingX = 10;
          const paddingY = 6;

          // Description preview (first ~80 chars)
          const rawDesc = (data._description || "").replace(/\n/g, " ").trim();
          const descText = rawDesc.length > 80 ? rawDesc.slice(0, 80) + "..." : rawDesc;
          let descWidth = 0;
          if (descText) {
            context.font = `400 ${descSize}px ${font}`;
            descWidth = context.measureText(descText).width;
          }

          const contentWidth = Math.max(nameWidth, descWidth);
          const width = contentWidth + paddingX * 2;
          const lineGap = descText ? 4 : 0;
          const descHeight = descText ? descSize + lineGap : 0;
          const height = size + descHeight + paddingY * 2;
          const x = data.x;
          const y = data.y - nodeSize - 12 - (descHeight / 2);
          const radius = 5;

          context.fillStyle = "#12121c";
          context.beginPath();
          context.roundRect(x - width / 2, y - height / 2, width, height, radius);
          context.fill();

          context.strokeStyle = data.color || "#7c3aed";
          context.lineWidth = 1.5;
          context.stroke();

          // Name
          context.font = `500 ${size}px ${font}`;
          context.fillStyle = "#f5f5f7";
          context.textAlign = "center";
          context.textBaseline = "middle";
          const nameY = descText ? y - descHeight / 2 : y;
          context.fillText(fullName, x, nameY);

          // Description
          if (descText) {
            context.font = `400 ${descSize}px ${font}`;
            context.fillStyle = "#8888a0";
            context.fillText(descText, x, nameY + size / 2 + lineGap + descSize / 2);
          }

          // Glow ring
          context.beginPath();
          context.arc(data.x, data.y, nodeSize + 3, 0, Math.PI * 2);
          context.strokeStyle = data.color || "#7c3aed";
          context.lineWidth = 1.5;
          context.globalAlpha = 0.4;
          context.stroke();
          context.globalAlpha = 1;
        },
      });

      // ---- Events ----

      sigmaInstance.on("clickNode", ({ node }) => {
        // Path mode: Shift+click or path button active
        if (pathMode || shiftHeld) {
          if (!pathMode) enterPathMode();

          if (!pathSource) {
            pathSource = node;
            setPathStatus(`Source: <strong>${node}</strong> — <span class="path-hint">click target node...</span>`);
            sigmaInstance.refresh();
          } else if (!pathTarget) {
            pathTarget = node;
            const result = findShortestPath(graphInstance, pathSource, pathTarget);
            if (result) {
              pathNodes = new Set(result.nodes);
              pathEdges = new Set(result.edges);
              setPathStatus(`<span class="path-length">${result.nodes.length} nodes, ${result.edges.length} hops</span> — <span class="path-hint">Esc to clear</span>`);
              showPathInDetail(result);
            } else {
              setPathStatus(`<span style="color:#ef4444">No path found</span> between ${pathSource} and ${pathTarget} — <span class="path-hint">Esc to clear</span>`);
            }
            sigmaInstance.refresh();
          } else {
            // Third click: restart with new source
            clearPath();
            pathSource = node;
            setPathStatus(`Source: <strong>${node}</strong> — <span class="path-hint">click target node...</span>`);
            sigmaInstance.refresh();
          }
          return;
        }

        selectedNode = node;
        showDetail(node);
        nudgeCamera();
      });

      sigmaInstance.on("doubleClickNode", ({ node, event }) => {
        event.preventSigmaDefault();
        if (focusedNeighborhood === node) {
          focusedNeighborhood = null;
          focusDepth = 1;
          focusedSet = null;
          document.getElementById("focus-btn").textContent = "Focus";
        } else {
          focusedNeighborhood = node;
          focusDepth = 1;
          updateFocusedSet();
          document.getElementById("focus-btn").textContent = "Focus (1)";
        }
        selectedNode = focusedNeighborhood ? node : null;
        if (focusedNeighborhood) showDetail(node);
        else hideDetail();
        sigmaInstance.refresh();
      });

      sigmaInstance.on("clickStage", () => {
        if (pathNodes.size > 0) return; // Don't clear path on stage click
        selectedNode = null;
        focusedNeighborhood = null;
        focusDepth = 1;
        focusedSet = null;
        document.getElementById("focus-btn").textContent = "Focus";
        hideDetail();
        nudgeCamera();
      });

      sigmaInstance.on("enterNode", ({ node }) => {
        hoveredNode = node;
        container.style.cursor = "pointer";
        sigmaInstance.refresh();
      });

      sigmaInstance.on("leaveNode", () => {
        hoveredNode = null;
        container.style.cursor = "grab";
        sigmaInstance.refresh();
      });

      // Search
      const searchInput = document.getElementById("search");
      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase().trim();
        searchMatches = new Map();
        if (query.length >= 2) {
          graphInstance.forEachNode((node, attrs) => {
            if (node.toLowerCase().includes(query)) {
              searchMatches.set(node, "name");
            } else if ((attrs._description || "").toLowerCase().includes(query)) {
              searchMatches.set(node, "desc");
            }
          });
        }
        sigmaInstance.refresh();
      });

      // Enter in search: zoom to first name match
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && searchMatches.size > 0) {
          // Prefer first name match, fallback to first desc match
          let target = null;
          for (const [node, type] of searchMatches) {
            if (type === "name") { target = node; break; }
            if (!target) target = node;
          }
          if (target) {
            selectedNode = target;
            showDetail(target);
            const attrs = graphInstance.getNodeAttributes(target);
            sigmaInstance.getCamera().animate(
              { x: attrs.x, y: attrs.y, ratio: 0.3 },
              { duration: 300 }
            );
            searchInput.blur();
            nudgeCamera();
          }
        }
      });

      // Layout control buttons
      document.getElementById("refresh-btn").addEventListener("click", refreshGraph);
      document.getElementById("reset-layout-btn").addEventListener("click", restoreOriginalPositions);
      document.getElementById("tighten-btn").addEventListener("click", relayoutVisible);
      document.getElementById("tensions-btn").addEventListener("click", () => {
        highlightTensions = !highlightTensions;
        document.getElementById("tensions-btn").classList.toggle("active", highlightTensions);
        sigmaInstance.refresh();
      });
      document.getElementById("heat-btn").addEventListener("click", () => {
        heatMode = !heatMode;
        document.getElementById("heat-btn").classList.toggle("active", heatMode);
        // Show/hide heat legend
        document.getElementById("heat-legend").style.display = heatMode ? "block" : "none";
        sigmaInstance.refresh();
      });
      document.getElementById("focus-btn").addEventListener("click", () => {
        if (!selectedNode) return;
        const btn = document.getElementById("focus-btn");
        if (!focusedNeighborhood) {
          // Enter focus mode at depth 1
          focusedNeighborhood = selectedNode;
          focusDepth = 1;
          updateFocusedSet();
          btn.textContent = "Focus (1)";
        } else if (focusedNeighborhood === selectedNode && focusDepth < 3) {
          // Cycle depth up
          focusDepth++;
          updateFocusedSet();
          btn.textContent = `Focus (${focusDepth})`;
        } else {
          // Turn off focus (depth 3 → off, or different node selected)
          focusedNeighborhood = null;
          focusDepth = 1;
          focusedSet = null;
          btn.textContent = "Focus";
        }
        sigmaInstance.refresh();
      });
      document.getElementById("path-btn").addEventListener("click", () => {
        if (pathMode) exitPathMode();
        else enterPathMode();
      });

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          selectedNode = null;
          hoveredNode = null;
          searchMatches = new Map();
          searchInput.value = "";
          hiddenGroups.clear();
          hiddenSubGroups.clear();
          hiddenEdgeTypes.clear();
          highlightTensions = false;
          focusedNeighborhood = null;
          focusDepth = 1;
          focusedSet = null;
          exitPathMode();
          document.getElementById("tensions-btn").classList.remove("active");
          document.getElementById("focus-btn").textContent = "Focus";
          restoreOriginalPositions();
          hideDetail();
          // Reset legend dimming
          document.querySelectorAll(".legend-item.dimmed, .legend-group-header.dimmed").forEach(
            el => el.classList.remove("dimmed")
          );
          nudgeCamera();
        }
        if (e.key === "/" && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
      });

      // Track Shift key for path mode (Shift+click)
      document.addEventListener("keydown", (e) => { if (e.key === "Shift") shiftHeld = true; });
      document.addEventListener("keyup", (e) => { if (e.key === "Shift") shiftHeld = false; });
      window.addEventListener("blur", () => { shiftHeld = false; }); // Reset on window blur

      // Hide loading
      hideProgress();
    }

    function nudgeCamera() {
      if (!sigmaInstance) return;
      const cam = sigmaInstance.getCamera();
      cam.animate({ ratio: cam.ratio * 1.0001 }, { duration: 50 });
      sigmaInstance.refresh();
    }

    function showDetail(nodeId) {
      const attrs = graphInstance.getNodeAttributes(nodeId);
      const panel = document.getElementById("detail");

      document.getElementById("detail-name").textContent = attrs._name || nodeId;
      const labelStr = (attrs._labels || []).join(", ");
      const groups = attrs._groups || [attrs._group || "unknown"];
      const groupStr = groups.filter(Boolean).join(" / ");
      document.getElementById("detail-meta").textContent =
        `${groupStr}${labelStr ? "  [" + labelStr + "]" : ""}  |  ${attrs._degree || 0} connections  |  updated ${attrs._updated_at || "?"}`;

      const desc = attrs._description || "";
      const descEl = document.getElementById("detail-desc");
      const showMoreEl = document.getElementById("detail-show-more");
      descEl.textContent = desc;
      descEl.classList.add("collapsed");
      if (desc.length > 400) {
        showMoreEl.textContent = "Show more";
        showMoreEl.style.display = "inline-block";
        showMoreEl.onclick = () => {
          const isCollapsed = descEl.classList.toggle("collapsed");
          showMoreEl.textContent = isCollapsed ? "Show more" : "Show less";
        };
      } else {
        descEl.classList.remove("collapsed");
        showMoreEl.style.display = "none";
      }

      // Properties
      const propsDiv = document.getElementById("detail-props");
      propsDiv.innerHTML = "";
      try {
        const allProps = JSON.parse(attrs._properties || "{}");
        // Filter out display fields already shown (name, description, channel, created_at, updated_at)
        const skipKeys = new Set(["name", "description", "channel", "created_at", "updated_at", "properties", "prev_description"]);
        const entries = Object.entries(allProps).filter(([k]) => !skipKeys.has(k));
        if (entries.length > 0) {
          propsDiv.innerHTML = `<h4>Properties</h4>` +
            entries.map(([k, v]) => `<div class="prop-item"><span class="prop-key">${k}</span>: <span class="prop-val">${String(v).length > 100 ? String(v).slice(0, 100) + "..." : v}</span></div>`).join("");
        }
      } catch (_) {}

      // List edges
      const edgesDiv = document.getElementById("detail-edges");
      edgesDiv.innerHTML = "";

      graphInstance.forEachEdge(nodeId, (edge, edgeAttrs, source, target) => {
        const other = source === nodeId ? target : source;
        const direction = source === nodeId ? "\u2192" : "\u2190";
        const item = document.createElement("div");
        item.className = "edge-item";
        const ctx = edgeAttrs._context ? `<div style="color:var(--text-muted);font-size:10px;padding-left:16px;">${edgeAttrs._context.length > 120 ? edgeAttrs._context.slice(0, 120) + "..." : edgeAttrs._context}</div>` : "";
        item.innerHTML = `${direction} <span class="edge-type">${edgeAttrs._relType}</span> <span class="edge-target" data-node="${other}">${other}</span>${ctx}`;
        edgesDiv.appendChild(item);
      });

      // Click on edge targets to navigate
      edgesDiv.querySelectorAll(".edge-target").forEach(el => {
        el.addEventListener("click", () => {
          const targetNode = el.dataset.node;
          selectedNode = targetNode;
          if (focusedNeighborhood) {
            focusedNeighborhood = targetNode;
            updateFocusedSet();
          }
          showDetail(targetNode);

          const targetAttrs = graphInstance.getNodeAttributes(targetNode);
          sigmaInstance.getCamera().animate(
            { x: targetAttrs.x, y: targetAttrs.y, ratio: sigmaInstance.getCamera().ratio },
            { duration: 300 }
          );
          nudgeCamera();
        });
      });

      panel.classList.add("visible");
    }

    function hideDetail() {
      document.getElementById("detail").classList.remove("visible");
    }

    function buildLegend(data, groupProps) {
      const legend = document.getElementById("legend");
      legend.innerHTML = "";

      const primaryLabel = groupProps[0] || "group";
      const hasSubGroups = groupProps.length > 1;

      // Build hierarchy from data
      const hierarchy = {}; // primary -> { sub -> count }
      for (const node of data.nodes) {
        const groups = node.groups || [node.group || "unknown"];
        const primary = groups[0] || "unknown";
        if (!hierarchy[primary]) hierarchy[primary] = {};
        if (hasSubGroups && groups.length > 1) {
          const sub = groups.slice(1).filter(Boolean).join("/") || primary;
          hierarchy[primary][sub] = (hierarchy[primary][sub] || 0) + 1;
        } else {
          hierarchy[primary]["_total"] = (hierarchy[primary]["_total"] || 0) + 1;
        }
      }

      // Section header
      const header = document.createElement("h3");
      header.textContent = hasSubGroups
        ? groupProps.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(" > ")
        : primaryLabel.charAt(0).toUpperCase() + primaryLabel.slice(1) + "s";
      legend.appendChild(header);

      // Collapse small groups into "Other" when there are too many
      const MAX_LEGEND_GROUPS = parseInt(new URLSearchParams(window.location.search).get("maxGroups") || "15", 10);
      const primariesByCount = Object.keys(hierarchy)
        .map(p => ({ name: p, count: Object.values(hierarchy[p]).reduce((a, b) => a + b, 0) }))
        .sort((a, b) => b.count - a.count);

      let sortedPrimaries;
      let otherGroup = null;
      if (primariesByCount.length > MAX_LEGEND_GROUPS) {
        const kept = primariesByCount.slice(0, MAX_LEGEND_GROUPS);
        const collapsed = primariesByCount.slice(MAX_LEGEND_GROUPS);
        sortedPrimaries = kept.map(p => p.name).sort();
        const otherCount = collapsed.reduce((sum, p) => sum + p.count, 0);
        otherGroup = { count: otherCount, groupCount: collapsed.length };
      } else {
        sortedPrimaries = primariesByCount.map(p => p.name).sort();
      }

      for (const primary of sortedPrimaries) {
        const entry = groupHierarchy[primary];
        const subs = hierarchy[primary];
        const totalCount = Object.values(subs).reduce((a, b) => a + b, 0);
        const subKeys = Object.keys(subs).filter(k => k !== "_total").sort();

        if (!hasSubGroups || subKeys.length === 0) {
          // Flat legend item (no sub-groups)
          const item = document.createElement("div");
          item.className = "legend-item";
          const isHidden = hiddenGroups.has(primary);
          if (isHidden) item.classList.add("dimmed");
          item.innerHTML = `<span class="legend-dot" style="background: ${entry?.color || "#6b7280"}"></span> ${primary} (${totalCount})`;
          item.addEventListener("click", () => {
            if (hiddenGroups.has(primary)) {
              hiddenGroups.delete(primary);
              item.classList.remove("dimmed");
            } else {
              hiddenGroups.add(primary);
              item.classList.add("dimmed");
            }
            sigmaInstance.refresh();
          });
          legend.appendChild(item);
        } else {
          // Nested group with sub-items
          const groupDiv = document.createElement("div");
          groupDiv.className = "legend-group";

          const headerDiv = document.createElement("div");
          headerDiv.className = "legend-group-header";
          const isHidden = hiddenGroups.has(primary);
          if (isHidden) headerDiv.classList.add("dimmed");
          headerDiv.innerHTML = `<span class="toggle">&#9660;</span><span class="legend-dot" style="background: ${entry?.color || "#6b7280"}"></span> ${primary} (${totalCount})`;

          const subsDiv = document.createElement("div");
          subsDiv.className = "legend-sub-items";

          // Click header: toggle entire group visibility
          headerDiv.addEventListener("click", (e) => {
            if (e.shiftKey) {
              // Shift+click: expand/collapse sub-list
              subsDiv.classList.toggle("collapsed");
              const toggle = headerDiv.querySelector(".toggle");
              toggle.innerHTML = subsDiv.classList.contains("collapsed") ? "&#9654;" : "&#9660;";
            } else {
              // Regular click: toggle visibility
              if (hiddenGroups.has(primary)) {
                hiddenGroups.delete(primary);
                headerDiv.classList.remove("dimmed");
                // Also unhide all sub-groups of this primary
                for (const sub of subKeys) {
                  hiddenSubGroups.delete(`${primary}/${sub}`);
                }
                subsDiv.querySelectorAll(".legend-item").forEach(el => el.classList.remove("dimmed"));
              } else {
                hiddenGroups.add(primary);
                headerDiv.classList.add("dimmed");
              }
              sigmaInstance.refresh();
            }
          });

          // Populate sub-items
          for (const sub of subKeys) {
            const subItem = document.createElement("div");
            subItem.className = "legend-item";
            const subColor = entry?.subs?.[sub] || entry?.color || "#6b7280";
            const subKey = `${primary}/${sub}`;
            if (hiddenSubGroups.has(subKey)) subItem.classList.add("dimmed");
            subItem.innerHTML = `<span class="legend-dot" style="background: ${subColor}"></span> ${sub} (${subs[sub]})`;
            subItem.addEventListener("click", (e) => {
              e.stopPropagation();
              if (hiddenSubGroups.has(subKey)) {
                hiddenSubGroups.delete(subKey);
                subItem.classList.remove("dimmed");
              } else {
                hiddenSubGroups.add(subKey);
                subItem.classList.add("dimmed");
              }
              sigmaInstance.refresh();
            });
            subsDiv.appendChild(subItem);
          }

          groupDiv.appendChild(headerDiv);
          groupDiv.appendChild(subsDiv);
          legend.appendChild(groupDiv);
        }
      }

      // "Other" collapsed group
      if (otherGroup) {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.style.opacity = "0.6";
        item.innerHTML = `<span class="legend-dot" style="background: #6b7280"></span> Other (${otherGroup.count} nodes in ${otherGroup.groupCount} groups)`;
        item.title = "Small groups collapsed. Adjust with ?maxGroups=N in URL.";
        legend.appendChild(item);
      }

      // Edge types section
      const edgeCounts = {};
      for (const edge of data.edges) {
        edgeCounts[edge.type] = (edgeCounts[edge.type] || 0) + 1;
      }
      const topEdges = Object.entries(edgeCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

      if (topEdges.length > 0) {
        const edgeHeader = document.createElement("h3");
        edgeHeader.textContent = "Edge Types";
        edgeHeader.style.marginTop = "10px";
        legend.appendChild(edgeHeader);

        for (const [type, count] of topEdges) {
          const item = document.createElement("div");
          item.className = "legend-item";
          if (hiddenEdgeTypes.has(type)) item.classList.add("dimmed");
          const color = edgeColors[type] || "#1a1a2a";
          item.innerHTML = `<span class="legend-dot" style="background: ${brightenColor(color, 3)}"></span> ${type} (${count})`;
          item.addEventListener("click", () => {
            if (hiddenEdgeTypes.has(type)) {
              hiddenEdgeTypes.delete(type);
              item.classList.remove("dimmed");
            } else {
              hiddenEdgeTypes.add(type);
              item.classList.add("dimmed");
            }
            sigmaInstance.refresh();
          });
          legend.appendChild(item);
        }
      }
    }

    // ---- Start ----
    init().catch(err => {
      console.error("Failed to initialize:", err);
      document.getElementById("loading").innerHTML = `<span style="color: #ef4444;">Failed to load graph: ${err.message}</span>`;
    });
  </script>
</body>
</html>
