<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>r7-viz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --void: #06060a;
      --deep: #0a0a10;
      --surface: #101018;
      --elevated: #16161f;
      --hover: #1c1c28;
      --border: #2a2a3a;
      --text-primary: #e4e4ed;
      --text-secondary: #8888a0;
      --text-muted: #5a5a70;
      --accent: #7c3aed;
    }

    body {
      background: var(--void);
      color: var(--text-primary);
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #graph-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      background:
        radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.03) 0%, transparent 70%),
        linear-gradient(to bottom, var(--void), var(--deep));
    }

    #graph-container canvas { outline: none; }

    /* Loading overlay */
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--void);
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading span { margin-left: 16px; color: var(--text-secondary); font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats bar */
    #stats {
      position: absolute;
      top: 12px; left: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      z-index: 10;
      display: flex;
      gap: 16px;
      backdrop-filter: blur(8px);
    }
    #stats .stat-value { color: var(--text-primary); font-weight: 600; }

    /* Legend */
    #legend {
      position: absolute;
      top: 12px; right: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: var(--text-secondary);
      z-index: 10;
      max-height: 70vh;
      overflow-y: auto;
      backdrop-filter: blur(8px);
      min-width: 180px;
    }
    #legend h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 0;
      cursor: pointer;
      opacity: 0.9;
      user-select: none;
    }
    .legend-item:hover { opacity: 1; }
    .legend-item.dimmed { opacity: 0.3; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-group {
      margin-bottom: 2px;
    }
    .legend-group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      cursor: pointer;
      opacity: 0.9;
      user-select: none;
      font-weight: 600;
    }
    .legend-group-header:hover { opacity: 1; }
    .legend-group-header.dimmed { opacity: 0.3; }
    .legend-group-header .toggle {
      font-size: 9px;
      color: var(--text-muted);
      width: 12px;
      text-align: center;
      flex-shrink: 0;
    }
    .legend-sub-items {
      padding-left: 18px;
      overflow: hidden;
      max-height: 500px;
      transition: max-height 0.2s ease;
    }
    .legend-sub-items.collapsed {
      max-height: 0;
    }

    /* Detail panel */
    #detail {
      position: absolute;
      bottom: 12px; left: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 12px;
      color: var(--text-secondary);
      z-index: 10;
      max-width: 480px;
      max-height: 40vh;
      overflow-y: auto;
      backdrop-filter: blur(8px);
      display: none;
    }
    #detail.visible { display: block; }
    #detail h2 {
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 4px;
      word-break: break-all;
    }
    #detail .meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    #detail .description {
      color: var(--text-secondary);
      line-height: 1.5;
      white-space: pre-wrap;
    }
    #detail .description.collapsed { max-height: 200px; overflow-y: hidden; }
    #detail .show-more {
      display: inline-block;
      margin-top: 4px;
      color: var(--accent);
      cursor: pointer;
      font-size: 11px;
    }
    #detail .show-more:hover { text-decoration: underline; }
    #detail .props-list {
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    #detail .props-list h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .prop-item {
      font-size: 11px;
      padding: 1px 0;
    }
    .prop-key { color: var(--accent); }
    .prop-val { color: var(--text-secondary); }
    #detail .edges-list {
      margin-top: 8px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    #detail .edge-item {
      padding: 2px 0;
      font-size: 11px;
    }
    .edge-type { color: var(--accent); font-weight: 500; }
    .edge-target { color: var(--text-primary); cursor: pointer; }
    .edge-target:hover { text-decoration: underline; }

    /* Layout control buttons */
    #layout-controls {
      position: absolute;
      top: 12px; left: 50%; transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .layout-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: opacity 0.2s, border-color 0.2s;
    }
    .layout-btn:hover { border-color: var(--accent); color: var(--text-primary); }

    /* Search */
    #search-container {
      position: absolute;
      bottom: 12px; right: 12px;
      z-index: 10;
    }
    #search {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      width: 220px;
      outline: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    /* Scrollbar styling */
    #legend::-webkit-scrollbar,
    #detail::-webkit-scrollbar {
      width: 6px;
    }
    #legend::-webkit-scrollbar-track,
    #detail::-webkit-scrollbar-track {
      background: transparent;
    }
    #legend::-webkit-scrollbar-thumb,
    #detail::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="graph-container"></div>

  <div id="loading">
    <div class="spinner"></div>
    <span>Loading graph...</span>
  </div>

  <div id="stats">
    <div>Nodes: <span class="stat-value" id="node-count">-</span></div>
    <div>Edges: <span class="stat-value" id="edge-count">-</span></div>
    <div><span id="group-label">Groups</span>: <span class="stat-value" id="channel-count">-</span></div>
  </div>

  <div id="legend"></div>

  <div id="detail">
    <h2 id="detail-name"></h2>
    <div class="meta" id="detail-meta"></div>
    <div class="description collapsed" id="detail-desc"></div>
    <span class="show-more" id="detail-show-more" style="display:none"></span>
    <div class="props-list" id="detail-props"></div>
    <div class="edges-list" id="detail-edges"></div>
  </div>

  <div id="layout-controls">
    <button id="refresh-btn" class="layout-btn" title="Re-fetch graph data">&#x21BB;</button>
    <button id="reset-layout-btn" class="layout-btn">Reset positions</button>
    <button id="tighten-btn" class="layout-btn">Tighten grouping</button>
  </div>

  <div id="search-container">
    <input id="search" type="text" placeholder="Search nodes... (press /)" />
  </div>

  <!-- Load from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/graphology/0.25.4/graphology.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sigma.js/3.0.0/sigma.min.js"></script>

  <script type="module">
    const { Graph } = graphology;

    // ---- Hierarchical color system ----
    // Primary groups get distinct hues spread around the color wheel.
    // Sub-groups within a primary get variations in lightness/saturation.

    const EDGE_PALETTE = [
      "#2a2a3a", "#1e3a5f", "#2d3a1e", "#3a2d1e", "#2d1e3a",
      "#1e3a3a", "#3a1e2d", "#1e2d3a", "#2d1e2d", "#3a3a1e",
      "#1e1e3a", "#3a1e1e",
    ];

    const edgeColors = {};

    // HSL utilities
    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s = Math.max(0, Math.min(100, s));
      l = Math.max(0, Math.min(100, l));
      const a = s * Math.min(l, 100 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l / 100 - a / 100 * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * Math.max(0, Math.min(1, color))).toString(16).padStart(2, "0");
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function hexToHsl(hex) {
      const m = hex.replace("#", "").match(/.{2}/g);
      let r = parseInt(m[0], 16) / 255;
      let g = parseInt(m[1], 16) / 255;
      let b = parseInt(m[2], 16) / 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
        else if (max === g) h = ((b - r) / d + 2) / 6;
        else h = ((r - g) / d + 4) / 6;
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }

    // Build hierarchical color map from data
    // Returns: { "primary": { hue, color, subs: { "sub1": color, "sub2": color } } }
    const groupHierarchy = {};
    const nodeColorCache = {};

    function buildColorHierarchy(nodes, groupProps) {
      // Collect unique primary groups
      const primarySet = new Set();
      const subMap = {}; // primary -> Set of subs

      for (const node of nodes) {
        const groups = node.groups || [node.group || "unknown"];
        const primary = groups[0] || node.group || "unknown";
        primarySet.add(primary);
        if (!subMap[primary]) subMap[primary] = new Set();
        // Sub-group is the combination of remaining levels
        if (groups.length > 1) {
          const sub = groups.slice(1).filter(Boolean).join("/") || primary;
          subMap[primary].add(sub);
        }
      }

      const primaries = [...primarySet].sort();
      const goldenAngle = 137.508; // degrees

      primaries.forEach((primary, i) => {
        // Distribute hues using golden angle for maximum distinctness
        const hue = (i * goldenAngle) % 360;
        const baseSaturation = 65;
        const baseLightness = 55;
        const baseColor = hslToHex(hue, baseSaturation, baseLightness);

        const subs = [...(subMap[primary] || [])].sort();
        const subColors = {};

        if (subs.length <= 1) {
          // Single or no sub-group: use base color
          if (subs.length === 1) subColors[subs[0]] = baseColor;
        } else {
          // Multiple sub-groups: vary lightness and saturation
          subs.forEach((sub, j) => {
            const lightShift = -15 + (30 * j / (subs.length - 1)); // range: -15 to +15
            const satShift = -10 + (20 * j / (subs.length - 1));   // range: -10 to +10
            subColors[sub] = hslToHex(
              hue,
              baseSaturation + satShift,
              baseLightness + lightShift
            );
          });
        }

        groupHierarchy[primary] = {
          hue,
          color: baseColor,
          subs: subColors,
        };
      });
    }

    function getNodeColor(node) {
      const cacheKey = node.id || node.name;
      if (nodeColorCache[cacheKey]) return nodeColorCache[cacheKey];

      const groups = node.groups || [node.group || "unknown"];
      const primary = groups[0] || node.group || "unknown";
      const entry = groupHierarchy[primary];
      if (!entry) {
        nodeColorCache[cacheKey] = "#6b7280";
        return "#6b7280";
      }

      let color = entry.color;
      if (groups.length > 1) {
        const sub = groups.slice(1).filter(Boolean).join("/") || primary;
        if (entry.subs[sub]) color = entry.subs[sub];
      }

      nodeColorCache[cacheKey] = color;
      return color;
    }

    function assignColor(map, key, palette) {
      if (!map[key]) {
        const idx = Object.keys(map).length % palette.length;
        map[key] = palette[idx];
      }
      return map[key];
    }

    const DARK_BG = { r: 6, g: 6, b: 10 }; // #06060a

    // ---- Helpers ----

    function hexToRgb(hex) {
      const m = hex.replace("#", "").match(/.{2}/g);
      return { r: parseInt(m[0], 16), g: parseInt(m[1], 16), b: parseInt(m[2], 16) };
    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, "0")).join("");
    }

    function dimColor(hex, amount) {
      const rgb = hexToRgb(hex);
      return rgbToHex(
        DARK_BG.r + (rgb.r - DARK_BG.r) * amount,
        DARK_BG.g + (rgb.g - DARK_BG.g) * amount,
        DARK_BG.b + (rgb.b - DARK_BG.b) * amount,
      );
    }

    function brightenColor(hex, factor) {
      const rgb = hexToRgb(hex);
      return rgbToHex(rgb.r * factor, rgb.g * factor, rgb.b * factor);
    }

    // ---- State ----
    let selectedNode = null;
    let hoveredNode = null;
    let searchMatches = new Map(); // node -> "name" | "desc"
    let graphData = null;
    let schemaData = null;
    let sigmaInstance = null;
    let graphInstance = null;

    // Filter state: which groups/sub-groups are hidden
    const hiddenGroups = new Set();    // primary groups
    const hiddenSubGroups = new Set(); // "primary/sub" keys

    // ---- Build graph ----

    function buildGraph(data, targetGraph) {
      const graph = targetGraph || new Graph();
      if (targetGraph) graph.clear();

      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      let i = 0;

      for (const node of data.nodes) {
        const angle = i * goldenAngle;
        const radius = Math.sqrt(i + 1) * 20;
        const color = getNodeColor(node);
        const groups = node.groups || [node.group || "unknown"];

        graph.addNode(node.id, {
          label: node.name.length > 40 ? node.name.split(":").slice(-1)[0] : node.name,
          x: Math.cos(angle) * radius,
          y: Math.sin(angle) * radius,
          size: 4,
          color: color,
          _name: node.name,
          _group: node.group,
          _groups: groups,
          _prefix: node.prefix,
          _description: node.description,
          _properties: node.properties,
          _labels: node.labels,
          _created_at: node.created_at,
          _updated_at: node.updated_at,
        });
        i++;
      }

      // Compute degree for sizing
      const degreeMap = {};
      for (const edge of data.edges) {
        degreeMap[edge.source] = (degreeMap[edge.source] || 0) + 1;
        degreeMap[edge.target] = (degreeMap[edge.target] || 0) + 1;
      }

      graph.forEachNode((node, attrs) => {
        const degree = degreeMap[node] || 0;
        const size = Math.max(3, Math.min(20, 3 + Math.sqrt(degree) * 2));
        graph.setNodeAttribute(node, "size", size);
        graph.setNodeAttribute(node, "_degree", degree);
      });

      // Add edges
      let edgeIdx = 0;
      for (const edge of data.edges) {
        if (!graph.hasNode(edge.source) || !graph.hasNode(edge.target)) continue;

        const edgeColor = assignColor(edgeColors, edge.type, EDGE_PALETTE);
        const curvature = 0.12 + Math.random() * 0.08;

        try {
          graph.addEdgeWithKey(`e${edgeIdx}`, edge.source, edge.target, {
            color: edgeColor,
            size: edge.type === "TENSION" ? 2 : 0.5,
            type: "curved",
            curvature: curvature,
            label: edge.type,
            _relType: edge.type,
            _context: edge.context,
          });
        } catch (_) {
          // Parallel edges: silently skip
        }
        edgeIdx++;
      }

      return graph;
    }

    // ---- Check if node is hidden by filter ----
    function isNodeHidden(attrs) {
      const groups = attrs._groups || [attrs._group || "unknown"];
      const primary = groups[0] || "unknown";

      // Check if entire primary group is hidden
      if (hiddenGroups.has(primary)) return true;

      // Check if specific sub-group is hidden
      if (groups.length > 1) {
        const sub = groups.slice(1).filter(Boolean).join("/") || primary;
        const key = `${primary}/${sub}`;
        if (hiddenSubGroups.has(key)) return true;
      }

      return false;
    }

    // ---- ForceAtlas2 ----

    function runForceAtlas2(graph, iterations = 300) {
      const nodes = [];
      graph.forEachNode((id, attrs) => {
        nodes.push({ id, x: attrs.x, y: attrs.y, size: attrs.size || 4 });
      });

      const nodeIndex = {};
      nodes.forEach((n, i) => nodeIndex[n.id] = i);

      const edges = [];
      graph.forEachEdge((edge, attrs, source, target) => {
        if (nodeIndex[source] !== undefined && nodeIndex[target] !== undefined) {
          edges.push({ source: nodeIndex[source], target: nodeIndex[target] });
        }
      });

      const gravity = 0.8;
      const scalingRatio = 15;
      const slowDown = 1;

      for (let iter = 0; iter < iterations; iter++) {
        const forces = nodes.map(() => ({ x: 0, y: 0 }));

        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
            const repulsion = (scalingRatio * nodes[i].size * nodes[j].size) / dist;
            const fx = (dx / dist) * repulsion;
            const fy = (dy / dist) * repulsion;
            forces[i].x += fx;
            forces[i].y += fy;
            forces[j].x -= fx;
            forces[j].y -= fy;
          }
        }

        for (const edge of edges) {
          const dx = nodes[edge.target].x - nodes[edge.source].x;
          const dy = nodes[edge.target].y - nodes[edge.source].y;
          const dist = Math.sqrt(dx * dx + dy * dy) + 0.01;
          const attraction = dist / scalingRatio;
          forces[edge.source].x += (dx / dist) * attraction;
          forces[edge.source].y += (dy / dist) * attraction;
          forces[edge.target].x -= (dx / dist) * attraction;
          forces[edge.target].y -= (dy / dist) * attraction;
        }

        for (let i = 0; i < nodes.length; i++) {
          const dist = Math.sqrt(nodes[i].x * nodes[i].x + nodes[i].y * nodes[i].y);
          if (dist > 0) {
            forces[i].x -= gravity * nodes[i].x / dist * nodes[i].size;
            forces[i].y -= gravity * nodes[i].y / dist * nodes[i].size;
          }
        }

        const cooling = 1 - (iter / iterations) * 0.5;
        for (let i = 0; i < nodes.length; i++) {
          const speed = (1 / (1 + Math.sqrt(forces[i].x * forces[i].x + forces[i].y * forces[i].y))) * cooling / slowDown;
          nodes[i].x += forces[i].x * speed;
          nodes[i].y += forces[i].y * speed;
        }
      }

      for (const node of nodes) {
        graph.setNodeAttribute(node.id, "x", node.x);
        graph.setNodeAttribute(node.id, "y", node.y);
      }
    }

    // ---- Re-layout visible nodes ----

    // Store original positions so we can reset
    const originalPositions = {};

    function saveOriginalPositions() {
      graphInstance.forEachNode((node, attrs) => {
        originalPositions[node] = { x: attrs.x, y: attrs.y };
      });
    }

    function restoreOriginalPositions() {
      graphInstance.forEachNode((node) => {
        const pos = originalPositions[node];
        if (pos) {
          graphInstance.setNodeAttribute(node, "x", pos.x);
          graphInstance.setNodeAttribute(node, "y", pos.y);
        }
      });
      sigmaInstance.refresh();
    }

    function relayoutVisible() {
      if (!graphInstance || !sigmaInstance) return;

      // Build a subgraph of only visible nodes
      const visibleNodes = [];
      graphInstance.forEachNode((node, attrs) => {
        if (!isNodeHidden(attrs)) {
          visibleNodes.push(node);
        }
      });

      if (visibleNodes.length === 0) return;

      const visibleSet = new Set(visibleNodes);

      // Create a temporary graph with only visible nodes
      const tempGraph = new Graph();
      for (const node of visibleNodes) {
        const attrs = graphInstance.getNodeAttributes(node);
        tempGraph.addNode(node, { x: attrs.x, y: attrs.y, size: attrs.size || 4 });
      }

      // Add edges between visible nodes
      graphInstance.forEachEdge((edge, attrs, source, target) => {
        if (visibleSet.has(source) && visibleSet.has(target)) {
          try {
            tempGraph.addEdge(source, target);
          } catch (_) {}
        }
      });

      // Run layout on the subgraph
      runForceAtlas2(tempGraph, 400);

      // Apply new positions back to the main graph
      tempGraph.forEachNode((node, attrs) => {
        graphInstance.setNodeAttribute(node, "x", attrs.x);
        graphInstance.setNodeAttribute(node, "y", attrs.y);
      });

      sigmaInstance.refresh();
    }


    // ---- Refresh ----

    async function refreshGraph() {
      const btn = document.getElementById("refresh-btn");
      const origText = btn.innerHTML;
      btn.textContent = "...";
      btn.disabled = true;
      try {
        const [schemaRes, graphRes] = await Promise.all([
          fetch("/api/schema"),
          fetch("/api/graph"),
        ]);
        schemaData = await schemaRes.json();
        graphData = await graphRes.json();

        // Clear caches
        for (const k in nodeColorCache) delete nodeColorCache[k];
        for (const k in groupHierarchy) delete groupHierarchy[k];

        const groupProps = schemaData.config?.GROUP_PROPS || ["channel"];
        buildColorHierarchy(graphData.nodes, groupProps);

        // Rebuild graph in place (Sigma observes mutations)
        buildGraph(graphData, graphInstance);
        runForceAtlas2(graphInstance, 400);
        saveOriginalPositions();

        // Update stats
        const primaryGroups = [...new Set(graphData.nodes.map(n => (n.groups || [n.group])[0] || "unknown"))];
        document.getElementById("node-count").textContent = graphData.nodes.length;
        document.getElementById("edge-count").textContent = graphData.edges.length;
        document.getElementById("channel-count").textContent = primaryGroups.length;
        buildLegend(graphData, groupProps);

        // Reset interaction state
        selectedNode = null;
        hoveredNode = null;
        searchMatches = new Map();
        hiddenGroups.clear();
        hiddenSubGroups.clear();
        document.getElementById("search").value = "";
        hideDetail();
        sigmaInstance.refresh();
      } catch (err) {
        console.error("Refresh failed:", err);
      } finally {
        btn.innerHTML = origText;
        btn.disabled = false;
      }
    }

    // ---- Render ----

    async function init() {
      const [schemaRes, graphRes] = await Promise.all([
        fetch("/api/schema"),
        fetch("/api/graph"),
      ]);
      schemaData = await schemaRes.json();
      graphData = await graphRes.json();

      // Build hierarchical color map
      const groupProps = schemaData.config?.GROUP_PROPS || ["channel"];
      buildColorHierarchy(graphData.nodes, groupProps);

      // Update stats
      const primaryLabel = groupProps[0] || "group";
      const primaryGroups = [...new Set(graphData.nodes.map(n => {
        const groups = n.groups || [n.group || "unknown"];
        return groups[0] || "unknown";
      }))];
      document.getElementById("node-count").textContent = graphData.nodes.length;
      document.getElementById("edge-count").textContent = graphData.edges.length;
      document.getElementById("channel-count").textContent = primaryGroups.length;
      document.getElementById("group-label").textContent =
        primaryLabel.charAt(0).toUpperCase() + primaryLabel.slice(1) + "s";

      // Build graph
      graphInstance = buildGraph(graphData);
      runForceAtlas2(graphInstance, 400);
      saveOriginalPositions();

      // Build legend
      buildLegend(graphData, groupProps);

      // Initialize Sigma
      const container = document.getElementById("graph-container");
      sigmaInstance = new Sigma(graphInstance, container, {
        edgeProgramClasses: {
          curved: Sigma.rendering.EdgeCurveProgram,
        },
        renderLabels: true,
        labelFont: "JetBrains Mono, SF Mono, monospace",
        labelSize: 11,
        labelWeight: "500",
        labelColor: { color: "#e4e4ed" },
        labelRenderedSizeThreshold: 7,
        labelDensity: 0.07,
        labelGridCellSize: 80,
        defaultNodeColor: "#6b7280",
        defaultEdgeColor: "#1a1a2a",
        minCameraRatio: 0.01,
        maxCameraRatio: 50,
        hideEdgesOnMove: true,
        zIndex: true,
        renderEdgeLabels: true,
        edgeLabelSize: 9,
        edgeLabelColor: { color: "#5a5a70" },
        edgeLabelRenderedSizeThreshold: 20,
        nodeReducer: (node, data) => {
          const res = { ...data };

          // Group filtering
          if (isNodeHidden(data)) {
            res.hidden = true;
            return res;
          }

          if (data.hidden) { res.hidden = true; return res; }

          // Search mode
          if (searchMatches.size > 0) {
            const matchType = searchMatches.get(node);
            if (matchType === "name") {
              res.color = "#06b6d4";
              res.size = (data.size || 4) * 2.2;
              res.zIndex = 3;
              res.highlighted = true;
            } else if (matchType === "desc") {
              res.color = "#0c4a5e";
              res.size = (data.size || 4) * 0.9;
              res.zIndex = 2;
            } else {
              res.color = dimColor(data.color || "#6b7280", 0.15);
              res.size = (data.size || 4) * 0.5;
              res.zIndex = 0;
            }
            return res;
          }

          // Selection mode
          if (selectedNode) {
            if (node === selectedNode) {
              res.size = (data.size || 4) * 1.8;
              res.zIndex = 3;
              res.highlighted = true;
            } else if (graphInstance.hasEdge(node, selectedNode) || graphInstance.hasEdge(selectedNode, node)) {
              res.size = (data.size || 4) * 1.3;
              res.zIndex = 2;
            } else {
              res.color = dimColor(data.color || "#6b7280", 0.2);
              res.size = (data.size || 4) * 0.5;
              res.zIndex = 0;
            }
            return res;
          }

          // Hover mode
          if (hoveredNode) {
            if (node === hoveredNode) {
              res.size = (data.size || 4) * 1.5;
              res.zIndex = 3;
              res.highlighted = true;
            } else if (graphInstance.hasEdge(node, hoveredNode) || graphInstance.hasEdge(hoveredNode, node)) {
              res.size = (data.size || 4) * 1.2;
              res.zIndex = 2;
            } else {
              res.color = dimColor(data.color || "#6b7280", 0.3);
              res.size = (data.size || 4) * 0.7;
              res.zIndex = 0;
            }
          }

          return res;
        },
        edgeReducer: (edge, data) => {
          const res = { ...data };
          const [source, target] = graphInstance.extremities(edge);

          // Hide edges connected to hidden nodes
          const sourceAttrs = graphInstance.getNodeAttributes(source);
          const targetAttrs = graphInstance.getNodeAttributes(target);
          if (isNodeHidden(sourceAttrs) || isNodeHidden(targetAttrs)) {
            res.hidden = true;
            return res;
          }

          if (searchMatches.size > 0) {
            if (searchMatches.has(source) && searchMatches.has(target)) {
              res.color = "#06b6d4";
              res.size = 2;
              res.zIndex = 2;
              res.forceLabel = true;
            } else {
              res.color = dimColor(data.color || "#1a1a2a", 0.05);
              res.size = 0.2;
              res.zIndex = 0;
            }
            return res;
          }

          const active = selectedNode || hoveredNode;
          if (active) {
            if (source === active || target === active) {
              res.color = brightenColor(data.color || "#2a2a3a", 2);
              res.size = Math.max(2, (data.size || 0.5) * 4);
              res.zIndex = 2;
              res.forceLabel = true;
            } else {
              res.color = dimColor(data.color || "#1a1a2a", 0.08);
              res.size = 0.2;
              res.zIndex = 0;
            }
          }

          return res;
        },
        defaultDrawNodeHover: (context, data, settings) => {
          const label = data.label;
          if (!label) return;

          const size = 11;
          const descSize = 9;
          const font = "JetBrains Mono, SF Mono, monospace";
          context.font = `500 ${size}px ${font}`;

          const fullName = data._name || label;
          const nameWidth = context.measureText(fullName).width;
          const nodeSize = data.size || 4;
          const paddingX = 10;
          const paddingY = 6;

          // Description preview (first ~80 chars)
          const rawDesc = (data._description || "").replace(/\n/g, " ").trim();
          const descText = rawDesc.length > 80 ? rawDesc.slice(0, 80) + "..." : rawDesc;
          let descWidth = 0;
          if (descText) {
            context.font = `400 ${descSize}px ${font}`;
            descWidth = context.measureText(descText).width;
          }

          const contentWidth = Math.max(nameWidth, descWidth);
          const width = contentWidth + paddingX * 2;
          const lineGap = descText ? 4 : 0;
          const descHeight = descText ? descSize + lineGap : 0;
          const height = size + descHeight + paddingY * 2;
          const x = data.x;
          const y = data.y - nodeSize - 12 - (descHeight / 2);
          const radius = 5;

          context.fillStyle = "#12121c";
          context.beginPath();
          context.roundRect(x - width / 2, y - height / 2, width, height, radius);
          context.fill();

          context.strokeStyle = data.color || "#7c3aed";
          context.lineWidth = 1.5;
          context.stroke();

          // Name
          context.font = `500 ${size}px ${font}`;
          context.fillStyle = "#f5f5f7";
          context.textAlign = "center";
          context.textBaseline = "middle";
          const nameY = descText ? y - descHeight / 2 : y;
          context.fillText(fullName, x, nameY);

          // Description
          if (descText) {
            context.font = `400 ${descSize}px ${font}`;
            context.fillStyle = "#8888a0";
            context.fillText(descText, x, nameY + size / 2 + lineGap + descSize / 2);
          }

          // Glow ring
          context.beginPath();
          context.arc(data.x, data.y, nodeSize + 3, 0, Math.PI * 2);
          context.strokeStyle = data.color || "#7c3aed";
          context.lineWidth = 1.5;
          context.globalAlpha = 0.4;
          context.stroke();
          context.globalAlpha = 1;
        },
      });

      // ---- Events ----

      sigmaInstance.on("clickNode", ({ node }) => {
        selectedNode = node;
        showDetail(node);
        nudgeCamera();
      });

      sigmaInstance.on("clickStage", () => {
        selectedNode = null;
        hideDetail();
        nudgeCamera();
      });

      sigmaInstance.on("enterNode", ({ node }) => {
        hoveredNode = node;
        container.style.cursor = "pointer";
        sigmaInstance.refresh();
      });

      sigmaInstance.on("leaveNode", () => {
        hoveredNode = null;
        container.style.cursor = "grab";
        sigmaInstance.refresh();
      });

      // Search
      const searchInput = document.getElementById("search");
      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase().trim();
        searchMatches = new Map();
        if (query.length >= 2) {
          graphInstance.forEachNode((node, attrs) => {
            if (node.toLowerCase().includes(query)) {
              searchMatches.set(node, "name");
            } else if ((attrs._description || "").toLowerCase().includes(query)) {
              searchMatches.set(node, "desc");
            }
          });
        }
        sigmaInstance.refresh();
      });

      // Enter in search: zoom to first name match
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && searchMatches.size > 0) {
          // Prefer first name match, fallback to first desc match
          let target = null;
          for (const [node, type] of searchMatches) {
            if (type === "name") { target = node; break; }
            if (!target) target = node;
          }
          if (target) {
            selectedNode = target;
            showDetail(target);
            const attrs = graphInstance.getNodeAttributes(target);
            sigmaInstance.getCamera().animate(
              { x: attrs.x, y: attrs.y, ratio: 0.3 },
              { duration: 300 }
            );
            searchInput.blur();
            nudgeCamera();
          }
        }
      });

      // Layout control buttons
      document.getElementById("refresh-btn").addEventListener("click", refreshGraph);
      document.getElementById("reset-layout-btn").addEventListener("click", restoreOriginalPositions);
      document.getElementById("tighten-btn").addEventListener("click", relayoutVisible);

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          selectedNode = null;
          hoveredNode = null;
          searchMatches = new Map();
          searchInput.value = "";
          hiddenGroups.clear();
          hiddenSubGroups.clear();
          restoreOriginalPositions();
          hideDetail();
          // Reset legend dimming
          document.querySelectorAll(".legend-item.dimmed, .legend-group-header.dimmed").forEach(
            el => el.classList.remove("dimmed")
          );
          nudgeCamera();
        }
        if (e.key === "/" && document.activeElement !== searchInput) {
          e.preventDefault();
          searchInput.focus();
        }
      });

      // Hide loading
      document.getElementById("loading").classList.add("hidden");
    }

    function nudgeCamera() {
      if (!sigmaInstance) return;
      const cam = sigmaInstance.getCamera();
      cam.animate({ ratio: cam.ratio * 1.0001 }, { duration: 50 });
      sigmaInstance.refresh();
    }

    function showDetail(nodeId) {
      const attrs = graphInstance.getNodeAttributes(nodeId);
      const panel = document.getElementById("detail");

      document.getElementById("detail-name").textContent = attrs._name || nodeId;
      const labelStr = (attrs._labels || []).join(", ");
      const groups = attrs._groups || [attrs._group || "unknown"];
      const groupStr = groups.filter(Boolean).join(" / ");
      document.getElementById("detail-meta").textContent =
        `${groupStr}${labelStr ? "  [" + labelStr + "]" : ""}  |  ${attrs._degree || 0} connections  |  updated ${attrs._updated_at || "?"}`;

      const desc = attrs._description || "";
      const descEl = document.getElementById("detail-desc");
      const showMoreEl = document.getElementById("detail-show-more");
      descEl.textContent = desc;
      descEl.classList.add("collapsed");
      if (desc.length > 400) {
        showMoreEl.textContent = "Show more";
        showMoreEl.style.display = "inline-block";
        showMoreEl.onclick = () => {
          const isCollapsed = descEl.classList.toggle("collapsed");
          showMoreEl.textContent = isCollapsed ? "Show more" : "Show less";
        };
      } else {
        descEl.classList.remove("collapsed");
        showMoreEl.style.display = "none";
      }

      // Properties
      const propsDiv = document.getElementById("detail-props");
      propsDiv.innerHTML = "";
      try {
        const allProps = JSON.parse(attrs._properties || "{}");
        // Filter out display fields already shown (name, description, channel, created_at, updated_at)
        const skipKeys = new Set(["name", "description", "channel", "created_at", "updated_at", "properties", "prev_description"]);
        const entries = Object.entries(allProps).filter(([k]) => !skipKeys.has(k));
        if (entries.length > 0) {
          propsDiv.innerHTML = `<h4>Properties</h4>` +
            entries.map(([k, v]) => `<div class="prop-item"><span class="prop-key">${k}</span>: <span class="prop-val">${String(v).length > 100 ? String(v).slice(0, 100) + "..." : v}</span></div>`).join("");
        }
      } catch (_) {}

      // List edges
      const edgesDiv = document.getElementById("detail-edges");
      edgesDiv.innerHTML = "";

      graphInstance.forEachEdge(nodeId, (edge, edgeAttrs, source, target) => {
        const other = source === nodeId ? target : source;
        const direction = source === nodeId ? "\u2192" : "\u2190";
        const item = document.createElement("div");
        item.className = "edge-item";
        item.innerHTML = `${direction} <span class="edge-type">${edgeAttrs._relType}</span> <span class="edge-target" data-node="${other}">${other}</span>`;
        edgesDiv.appendChild(item);
      });

      // Click on edge targets to navigate
      edgesDiv.querySelectorAll(".edge-target").forEach(el => {
        el.addEventListener("click", () => {
          const targetNode = el.dataset.node;
          selectedNode = targetNode;
          showDetail(targetNode);

          const targetAttrs = graphInstance.getNodeAttributes(targetNode);
          sigmaInstance.getCamera().animate(
            { x: targetAttrs.x, y: targetAttrs.y, ratio: sigmaInstance.getCamera().ratio },
            { duration: 300 }
          );
          nudgeCamera();
        });
      });

      panel.classList.add("visible");
    }

    function hideDetail() {
      document.getElementById("detail").classList.remove("visible");
    }

    function buildLegend(data, groupProps) {
      const legend = document.getElementById("legend");
      legend.innerHTML = "";

      const primaryLabel = groupProps[0] || "group";
      const hasSubGroups = groupProps.length > 1;

      // Build hierarchy from data
      const hierarchy = {}; // primary -> { sub -> count }
      for (const node of data.nodes) {
        const groups = node.groups || [node.group || "unknown"];
        const primary = groups[0] || "unknown";
        if (!hierarchy[primary]) hierarchy[primary] = {};
        if (hasSubGroups && groups.length > 1) {
          const sub = groups.slice(1).filter(Boolean).join("/") || primary;
          hierarchy[primary][sub] = (hierarchy[primary][sub] || 0) + 1;
        } else {
          hierarchy[primary]["_total"] = (hierarchy[primary]["_total"] || 0) + 1;
        }
      }

      // Section header
      const header = document.createElement("h3");
      header.textContent = hasSubGroups
        ? groupProps.map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(" > ")
        : primaryLabel.charAt(0).toUpperCase() + primaryLabel.slice(1) + "s";
      legend.appendChild(header);

      const sortedPrimaries = Object.keys(hierarchy).sort();

      for (const primary of sortedPrimaries) {
        const entry = groupHierarchy[primary];
        const subs = hierarchy[primary];
        const totalCount = Object.values(subs).reduce((a, b) => a + b, 0);
        const subKeys = Object.keys(subs).filter(k => k !== "_total").sort();

        if (!hasSubGroups || subKeys.length === 0) {
          // Flat legend item (no sub-groups)
          const item = document.createElement("div");
          item.className = "legend-item";
          const isHidden = hiddenGroups.has(primary);
          if (isHidden) item.classList.add("dimmed");
          item.innerHTML = `<span class="legend-dot" style="background: ${entry?.color || "#6b7280"}"></span> ${primary} (${totalCount})`;
          item.addEventListener("click", () => {
            if (hiddenGroups.has(primary)) {
              hiddenGroups.delete(primary);
              item.classList.remove("dimmed");
            } else {
              hiddenGroups.add(primary);
              item.classList.add("dimmed");
            }
            sigmaInstance.refresh();
          });
          legend.appendChild(item);
        } else {
          // Nested group with sub-items
          const groupDiv = document.createElement("div");
          groupDiv.className = "legend-group";

          const headerDiv = document.createElement("div");
          headerDiv.className = "legend-group-header";
          const isHidden = hiddenGroups.has(primary);
          if (isHidden) headerDiv.classList.add("dimmed");
          headerDiv.innerHTML = `<span class="toggle">&#9660;</span><span class="legend-dot" style="background: ${entry?.color || "#6b7280"}"></span> ${primary} (${totalCount})`;

          const subsDiv = document.createElement("div");
          subsDiv.className = "legend-sub-items";

          // Click header: toggle entire group visibility
          headerDiv.addEventListener("click", (e) => {
            if (e.shiftKey) {
              // Shift+click: expand/collapse sub-list
              subsDiv.classList.toggle("collapsed");
              const toggle = headerDiv.querySelector(".toggle");
              toggle.innerHTML = subsDiv.classList.contains("collapsed") ? "&#9654;" : "&#9660;";
            } else {
              // Regular click: toggle visibility
              if (hiddenGroups.has(primary)) {
                hiddenGroups.delete(primary);
                headerDiv.classList.remove("dimmed");
                // Also unhide all sub-groups of this primary
                for (const sub of subKeys) {
                  hiddenSubGroups.delete(`${primary}/${sub}`);
                }
                subsDiv.querySelectorAll(".legend-item").forEach(el => el.classList.remove("dimmed"));
              } else {
                hiddenGroups.add(primary);
                headerDiv.classList.add("dimmed");
              }
              sigmaInstance.refresh();
            }
          });

          // Populate sub-items
          for (const sub of subKeys) {
            const subItem = document.createElement("div");
            subItem.className = "legend-item";
            const subColor = entry?.subs?.[sub] || entry?.color || "#6b7280";
            const subKey = `${primary}/${sub}`;
            if (hiddenSubGroups.has(subKey)) subItem.classList.add("dimmed");
            subItem.innerHTML = `<span class="legend-dot" style="background: ${subColor}"></span> ${sub} (${subs[sub]})`;
            subItem.addEventListener("click", (e) => {
              e.stopPropagation();
              if (hiddenSubGroups.has(subKey)) {
                hiddenSubGroups.delete(subKey);
                subItem.classList.remove("dimmed");
              } else {
                hiddenSubGroups.add(subKey);
                subItem.classList.add("dimmed");
              }
              sigmaInstance.refresh();
            });
            subsDiv.appendChild(subItem);
          }

          groupDiv.appendChild(headerDiv);
          groupDiv.appendChild(subsDiv);
          legend.appendChild(groupDiv);
        }
      }

      // Edge types section
      const edgeCounts = {};
      for (const edge of data.edges) {
        edgeCounts[edge.type] = (edgeCounts[edge.type] || 0) + 1;
      }
      const topEdges = Object.entries(edgeCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);

      if (topEdges.length > 0) {
        const edgeHeader = document.createElement("h3");
        edgeHeader.textContent = "Edge Types";
        edgeHeader.style.marginTop = "10px";
        legend.appendChild(edgeHeader);

        for (const [type, count] of topEdges) {
          const item = document.createElement("div");
          item.className = "legend-item";
          const color = edgeColors[type] || "#1a1a2a";
          item.innerHTML = `<span class="legend-dot" style="background: ${brightenColor(color, 3)}"></span> ${type} (${count})`;
          legend.appendChild(item);
        }
      }
    }

    // ---- Start ----
    init().catch(err => {
      console.error("Failed to initialize:", err);
      document.getElementById("loading").innerHTML = `<span style="color: #ef4444;">Failed to load graph: ${err.message}</span>`;
    });
  </script>
</body>
</html>
